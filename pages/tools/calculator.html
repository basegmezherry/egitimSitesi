<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hesap Makinesi — EduPlay</title>
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
.calc-wrap{max-width:420px;margin:0 auto;padding:80px 20px 40px}
.calc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.calc-header a{color:var(--text-2);text-decoration:none;font-size:13px}
.calc-title{font-family:var(--f-display);font-size:18px;font-weight:800}
.calc-box{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-lg)}
.calc-display{background:rgba(0,0,0,.3);padding:20px 24px;min-height:100px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;gap:6px}
.calc-expr{font-family:var(--f-mono);font-size:13px;color:var(--text-2);min-height:18px;word-break:break-all;text-align:right}
.calc-num{font-family:var(--f-mono);font-size:36px;font-weight:700;color:var(--text);word-break:break-all;text-align:right;line-height:1}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:rgba(255,255,255,.04)}
.calc-btn{background:var(--card);border:none;padding:0;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:17px;font-weight:700;cursor:pointer;color:var(--text);transition:background var(--t-fast);user-select:none}
.calc-btn:active{background:rgba(99,219,255,.15)}
.calc-btn.op{color:var(--cyan)}
.calc-btn.func{font-size:13px;color:var(--text-2)}
.calc-btn.eq{background:linear-gradient(135deg,var(--cyan),#45c3f0);color:var(--ink);font-size:22px}
.calc-btn.eq:active{background:rgba(99,219,255,.8)}
.calc-btn.clr{color:var(--coral)}
.calc-btn.zero{grid-column:span 2;aspect-ratio:unset;padding:16px 24px;justify-content:flex-start}
.history-box{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.history-title{font-size:12px;color:var(--text-2);margin-bottom:10px;font-family:var(--f-mono);text-transform:uppercase;letter-spacing:.1em}
.history-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-family:var(--f-mono);font-size:13px;color:var(--text-2)}
.history-item:last-child{border-bottom:none}
.history-item .result{color:var(--cyan);font-weight:700}
</style>
</head>
<body>
<div class="calc-wrap">
  <div class="calc-header">
    <a href="index.html">← Araçlar</a>
    <div class="calc-title">🔢 Hesap Makinesi</div>
    <span></span>
  </div>

  <div class="calc-box">
    <div class="calc-display">
      <div class="calc-expr" id="expr"></div>
      <div class="calc-num" id="display">0</div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn func" onclick="calcFn('C')">C</button>
      <button class="calc-btn func" onclick="calcFn('pm')">±</button>
      <button class="calc-btn func" onclick="calcFn('%')">%</button>
      <button class="calc-btn op" onclick="calcFn('/')">÷</button>

      <button class="calc-btn" onclick="calcFn('7')">7</button>
      <button class="calc-btn" onclick="calcFn('8')">8</button>
      <button class="calc-btn" onclick="calcFn('9')">9</button>
      <button class="calc-btn op" onclick="calcFn('*')">×</button>

      <button class="calc-btn" onclick="calcFn('4')">4</button>
      <button class="calc-btn" onclick="calcFn('5')">5</button>
      <button class="calc-btn" onclick="calcFn('6')">6</button>
      <button class="calc-btn op" onclick="calcFn('-')">−</button>

      <button class="calc-btn" onclick="calcFn('1')">1</button>
      <button class="calc-btn" onclick="calcFn('2')">2</button>
      <button class="calc-btn" onclick="calcFn('3')">3</button>
      <button class="calc-btn op" onclick="calcFn('+')">+</button>

      <button class="calc-btn zero" onclick="calcFn('0')">0</button>
      <button class="calc-btn" onclick="calcFn('.')">.</button>
      <button class="calc-btn eq" onclick="calcFn('=')">=</button>
    </div>
  </div>

  <!-- Geçmiş -->
  <div class="history-box">
    <div class="history-title">Geçmiş</div>
    <div id="historyList"><p style="font-size:12px;color:var(--text-3)">Henüz işlem yok</p></div>
  </div>
</div>

<div id="toast-root"></div>
<script>
let current = '0', expr = '', operator = null, prevVal = null, waitingForOp = false;
const history = [];

function updateDisplay() {
  document.getElementById('display').textContent = current.length > 12 ? parseFloat(current).toExponential(4) : current;
  document.getElementById('expr').textContent = expr;
}

function calcFn(btn) {
  if (btn === 'C') { current='0'; expr=''; operator=null; prevVal=null; waitingForOp=false; }
  else if (btn === 'pm') { current = String(-parseFloat(current)); }
  else if (btn === '%') { current = String(parseFloat(current)/100); }
  else if (btn === '.') {
    if (!current.includes('.')) current += '.';
  }
  else if ('0123456789'.includes(btn)) {
    if (waitingForOp) { current = btn; waitingForOp = false; }
    else current = current === '0' ? btn : current + btn;
  }
  else if (['+','-','*','/'].includes(btn)) {
    prevVal = parseFloat(current);
    operator = btn;
    expr = current + ' ' + ({'+':'+','-':'−','*':'×','/':'÷'}[btn]);
    waitingForOp = true;
  }
  else if (btn === '=') {
    if (operator && prevVal !== null) {
      const a = prevVal, b = parseFloat(current);
      let result;
      if (operator === '+') result = a + b;
      else if (operator === '-') result = a - b;
      else if (operator === '*') result = a * b;
      else if (operator === '/') result = b !== 0 ? a / b : 'Hata';

      const fullExpr = expr + ' ' + current + ' =';
      history.unshift({ expr: fullExpr, result: result });
      if (history.length > 10) history.pop();
      renderHistory();

      current = typeof result === 'number' ? String(Number(result.toFixed(10))) : result;
      expr = fullExpr;
      operator = null; prevVal = null; waitingForOp = true;
    }
  }
  updateDisplay();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) { list.innerHTML = '<p style="font-size:12px;color:var(--text-3)">Henüz işlem yok</p>'; return; }
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <span>${h.expr}</span>
      <span class="result">${h.result}</span>
    </div>`).join('');
}

document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') calcFn(e.key);
  else if (['+','-','*','/'].includes(e.key)) calcFn(e.key);
  else if (e.key === 'Enter' || e.key === '=') calcFn('=');
  else if (e.key === '.' || e.key === ',') calcFn('.');
  else if (e.key === 'Escape') calcFn('C');
  else if (e.key === 'Backspace') {
    current = current.length > 1 ? current.slice(0,-1) : '0';
    updateDisplay();
  }
});

updateDisplay();
</script>
</body>
</html>
