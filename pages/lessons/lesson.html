<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ders — EduPlay</title>
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
.lesson-layout{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start}
.sidebar{position:sticky;top:90px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.sidebar-title{font-family:var(--f-display);font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--text-2);transition:all var(--t-fast)}
.sidebar-item:hover,.sidebar-item.active{background:rgba(99,219,255,.08);color:var(--cyan)}
.sidebar-item .step-dot{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.sidebar-item.done .step-dot{background:rgba(184,255,78,.15);border-color:var(--lime);color:var(--lime)}
.sidebar-item.active .step-dot{background:rgba(99,219,255,.15);border-color:var(--cyan);color:var(--cyan)}
.lesson-main{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;min-height:60vh}
.lesson-step{display:none}
.lesson-step.active{display:block;animation:fadeUp .4s var(--ease)}
.content-text{font-size:15.5px;line-height:1.8;color:var(--text);margin-bottom:16px}
.content-highlight{background:rgba(99,219,255,.07);border:1px solid rgba(99,219,255,.2);border-left:3px solid var(--cyan);border-radius:8px;padding:14px 18px;font-size:14.5px;line-height:1.7;margin-bottom:16px;white-space:pre-line}
.content-example{background:rgba(184,255,78,.05);border:1px solid rgba(184,255,78,.15);border-left:3px solid var(--lime);border-radius:8px;padding:16px 18px;margin-bottom:16px}
.content-example .ex-title{font-weight:700;font-size:13px;color:var(--lime);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.content-example .ex-body{font-family:var(--f-mono);font-size:13.5px;color:var(--text);line-height:1.8;white-space:pre-line}
.quiz-block{background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.2);border-radius:12px;padding:20px;margin-top:20px}
.quiz-q{font-weight:700;font-size:15px;margin-bottom:14px;color:var(--text)}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.03);cursor:pointer;transition:all var(--t-fast);font-size:14px}
.quiz-opt:hover{border-color:var(--cyan);background:rgba(99,219,255,.06)}
.quiz-opt.correct{border-color:var(--lime);background:rgba(184,255,78,.1);color:var(--lime)}
.quiz-opt.wrong{border-color:var(--coral);background:rgba(255,107,107,.1);color:var(--coral)}
.quiz-opt .opt-letter{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:11px;font-weight:700;flex-shrink:0}
.lesson-nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.step-progress{text-align:center;font-size:12px;color:var(--text-2);font-family:var(--f-mono)}
.complete-banner{background:linear-gradient(135deg,rgba(184,255,78,.1),rgba(99,219,255,.06));border:1px solid rgba(184,255,78,.25);border-radius:16px;padding:28px;text-align:center;margin-top:20px}
.cb-icon{font-size:48px;margin-bottom:12px}
.cb-title{font-family:var(--f-display);font-size:20px;font-weight:800;color:var(--lime);margin-bottom:8px}
@media(max-width:768px){.lesson-layout{grid-template-columns:1fr}.sidebar{position:relative;top:0}}
</style>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="nav-logo"><div class="nav-logo-mark">🎓</div><span class="nav-logo-text">EduPlay</span></a>
  <div class="nav-links">
    <a href="../../index.html">Ana Sayfa</a>
    <a href="index.html" class="active">📚 Öğren</a>
    <a href="../test.html">✏️ Testler</a>
    <a href="../games.html">🎮 Oyunlar</a>
  </div>
  <div class="nav-right">
    <div class="nav-xp">⚡ <span id="navXP">0</span> XP</div>
    <a href="../profile.html" class="nav-avatar" id="navAvatar">🎓</a>
  </div>
  <button class="nav-hamburger" onclick="toggleDrawer()">☰</button>
</nav>
<nav class="nav-drawer" id="navDrawer">
  <a href="../../index.html">🏠 Ana Sayfa</a>
  <a href="index.html">📚 Öğren</a><a href="../test.html">✏️ Testler</a>
  <a href="../games.html">🎮 Oyunlar</a><a href="../profile.html">👤 Profil</a>
</nav>

<div class="page-wrapper"><div class="container" style="padding:24px 20px">

  <!-- Breadcrumb -->
  <div style="font-size:13px;color:var(--text-2);margin-bottom:20px">
    <a href="index.html" style="color:var(--text-2);text-decoration:none">📚 Dersler</a>
    <span style="margin:0 6px">›</span>
    <span id="breadcrumb" style="color:var(--cyan)">Yükleniyor…</span>
  </div>

  <!-- İlerleme çubuğu -->
  <div class="progress" style="margin-bottom:20px">
    <div class="progress-fill" id="lessonProgress" style="width:0%"></div>
  </div>

  <div class="lesson-layout">
    <!-- Sidebar -->
    <div class="sidebar" id="stepSidebar">
      <div class="sidebar-title">İçindekiler</div>
      <div id="stepList"></div>
    </div>

    <!-- Ana içerik -->
    <div>
      <div class="lesson-main" id="lessonMain">
        <p style="color:var(--text-2)">Ders yükleniyor…</p>
      </div>
    </div>
  </div>
</div></div>

<div id="toast-root"></div>
<script src="../../js/router.js"></script>
<script src="../../js/ads.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const lessonId = params.get('id');
let lessonData = null, currentStep = 0, quizAnswered = false;

async function loadLesson() {
  try {
    const res = await fetch('../../data/lessons.json');
    const data = await res.json();
    // Tüm dersler arasında ID ile ara
    for (const subj of data.subjects) {
      for (const unit of subj.units) {
        for (const lesson of unit.lessons) {
          if (lesson.id === lessonId) {
            lessonData = lesson;
            document.title = lesson.title + ' — EduPlay';
            document.getElementById('breadcrumb').textContent = lesson.title;
            renderSidebar();
            showStep(0);
            return;
          }
        }
      }
    }
    document.getElementById('lessonMain').innerHTML = '<p>Ders bulunamadı. <a href="index.html" style="color:var(--cyan)">Geri dön</a></p>';
  } catch(e) {
    document.getElementById('lessonMain').innerHTML = '<p style="color:var(--coral)">Ders yüklenemedi.</p>';
  }
}

function renderSidebar() {
  const steps = lessonData.content;
  const completed = getCompleted();
  document.getElementById('stepList').innerHTML = steps.map((s, i) => {
    const icons = { text: '📄', highlight: '💡', example: '📝', quiz: '❓' };
    const labels = { text: 'Açıklama', highlight: 'Not', example: 'Örnek', quiz: 'Mini Test' };
    return `
    <div class="sidebar-item ${i===0?'active':''}" id="sb_${i}" onclick="showStep(${i})">
      <div class="step-dot">${i+1}</div>
      <span>${icons[s.type]||'📄'} ${labels[s.type]||s.type}</span>
    </div>`;
  }).join('') + `<div class="sidebar-item" id="sb_complete" style="display:none"><div class="step-dot" style="background:rgba(184,255,78,.15);border-color:var(--lime)">✓</div><span style="color:var(--lime)">Tamamlandı!</span></div>`;
}

function showStep(idx) {
  if (!lessonData) return;
  const steps = lessonData.content;
  if (idx >= steps.length) { showComplete(); return; }

  currentStep = idx;
  quizAnswered = false;
  const step = steps[idx];
  const isLast = idx === steps.length - 1;

  // Sidebar highlight
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    if (i < idx) el.classList.add('done');
  });

  // Progress bar
  document.getElementById('lessonProgress').style.width = ((idx / steps.length) * 100) + '%';

  const main = document.getElementById('lessonMain');
  let html = '';

  if (step.type === 'text') {
    html = `<div class="content-text">${step.text}</div>`;
  } else if (step.type === 'highlight') {
    html = `<div class="content-highlight">${step.text}</div>`;
  } else if (step.type === 'example') {
    html = `<div class="content-example"><div class="ex-title">${step.title}</div><div class="ex-body">${step.text}</div></div>`;
  } else if (step.type === 'quiz') {
    html = `
    <div class="quiz-block">
      <div class="quiz-q">❓ ${step.question}</div>
      <div class="quiz-options">
        ${step.options.map((opt, i) => `
          <div class="quiz-opt" id="qopt_${i}" onclick="answerQuiz(${i}, ${step.answer})">
            <div class="opt-letter">${'ABCD'[i]}</div>
            <span>${opt}</span>
          </div>`).join('')}
      </div>
      <div id="quizFeedback" style="margin-top:12px;font-size:13.5px;display:none"></div>
    </div>`;
  }

  html += `
  <div class="lesson-nav">
    <button class="btn btn-ghost btn-sm" onclick="showStep(${idx-1})" ${idx===0?'disabled':''}>← Önceki</button>
    <div class="step-progress">${idx+1} / ${steps.length}</div>
    <button class="btn btn-primary btn-sm" id="nextBtn" onclick="${step.type==='quiz' && !quizAnswered ? '' : `showStep(${idx+1})`}" ${step.type==='quiz' && !quizAnswered ? 'disabled' : ''}>${isLast ? '✅ Tamamla' : 'Sonraki →'}</button>
  </div>`;

  main.innerHTML = html;
}

function answerQuiz(chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;

  document.querySelectorAll('.quiz-opt').forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === correct) el.classList.add('correct');
    else if (i === chosen && chosen !== correct) el.classList.add('wrong');
  });

  const fb = document.getElementById('quizFeedback');
  fb.style.display = 'block';
  if (chosen === correct) {
    fb.innerHTML = '<span style="color:var(--lime)">✅ Doğru! Harika!</span>';
    if (window.showToast) showToast('✅ Doğru cevap! +5 XP', 'success', 2000);
  } else {
    fb.innerHTML = `<span style="color:var(--coral)">❌ Yanlış. Doğru cevap: <strong>${'ABCD'[correct]}</strong></span>`;
  }

  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) {
    nextBtn.disabled = false;
    nextBtn.onclick = () => showStep(currentStep + 1);
  }
}

function showComplete() {
  const main = document.getElementById('lessonMain');
  main.innerHTML = `
  <div class="complete-banner">
    <div class="cb-icon">🎉</div>
    <div class="cb-title">Ders Tamamlandı!</div>
    <p style="color:var(--text-2);margin-bottom:20px">Harika iş! Bu dersi başarıyla bitirdin.</p>
    <div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:20px">
      <div style="background:rgba(99,219,255,.1);border:1px solid rgba(99,219,255,.2);border-radius:10px;padding:12px 20px;text-align:center">
        <div style="font-family:var(--f-display);font-size:22px;color:var(--cyan)">+${lessonData.xp}</div>
        <div style="font-size:11px;color:var(--text-2)">XP kazandın</div>
      </div>
      <div style="background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.2);border-radius:10px;padding:12px 20px;text-align:center">
        <div style="font-family:var(--f-display);font-size:22px;color:var(--gold)">⭐ +10</div>
        <div style="font-size:11px;color:var(--text-2)">Altın kazandın</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <a href="index.html" class="btn btn-ghost">← Ders Listesi</a>
      <a href="../test.html" class="btn btn-primary">✏️ Test Çöz</a>
    </div>
  </div>`;

  document.getElementById('lessonProgress').style.width = '100%';

  // Kaydet
  try {
    const u = JSON.parse(localStorage.getItem('eduplay_user') || '{}');
    u.completedLessons = u.completedLessons || [];
    if (!u.completedLessons.includes(lessonId)) {
      u.completedLessons.push(lessonId);
      u.xp = (u.xp || 0) + lessonData.xp;
      u.coins = (u.coins || 0) + 10;
      u.activities = u.activities || [];
      u.activities.push({ icon: '📚', text: `"${lessonData.title}" dersi tamamlandı`, xp: '+' + lessonData.xp + ' XP', time: 'Az önce' });
      localStorage.setItem('eduplay_user', JSON.stringify(u));
      document.getElementById('navXP').textContent = u.xp.toLocaleString('tr-TR');
    }
  } catch(e) {}
}

function getCompleted() {
  try { return JSON.parse(localStorage.getItem('eduplay_user') || '{}').completedLessons || []; }
  catch { return []; }
}

loadLesson();
</script>
</body>
</html>
