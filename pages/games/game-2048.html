<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>2048 — EduPlay</title>
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:var(--ink);min-height:100vh;overscroll-behavior:none}
.game-wrap{max-width:460px;margin:0 auto;padding:80px 16px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
.game-header{width:100%;display:flex;align-items:center;justify-content:space-between}
.game-header a{color:var(--text-2);text-decoration:none;font-size:13px}
.game-title{font-family:var(--f-display);font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-row{display:flex;gap:10px}
.score-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;text-align:center;min-width:75px}
.sb-label{font-size:10px;color:var(--text-2);font-family:var(--f-mono);text-transform:uppercase;letter-spacing:.07em}
.sb-val{font-family:var(--f-display);font-size:20px;font-weight:800;color:var(--cyan)}
.board{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:420px;touch-action:none}
.cell{aspect-ratio:1;border-radius:8px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-weight:800;transition:all .12s ease;position:relative}
.cell[data-val]:not([data-val="0"]){animation:popIn .12s ease}
@keyframes popIn{0%{transform:scale(.8)}100%{transform:scale(1)}}
.cell[data-val="2"]   {background:rgba(99,219,255,.15);color:var(--cyan);font-size:min(8vw,32px)}
.cell[data-val="4"]   {background:rgba(99,219,255,.25);color:var(--cyan);font-size:min(8vw,32px)}
.cell[data-val="8"]   {background:rgba(184,255,78,.2);color:var(--lime);font-size:min(8vw,32px)}
.cell[data-val="16"]  {background:rgba(184,255,78,.3);color:var(--lime);font-size:min(7vw,28px)}
.cell[data-val="32"]  {background:rgba(255,209,102,.25);color:var(--gold);font-size:min(7vw,28px)}
.cell[data-val="64"]  {background:rgba(255,209,102,.35);color:var(--gold);font-size:min(7vw,28px)}
.cell[data-val="128"] {background:rgba(255,107,107,.25);color:var(--coral);font-size:min(6vw,24px)}
.cell[data-val="256"] {background:rgba(255,107,107,.35);color:var(--coral);font-size:min(6vw,24px)}
.cell[data-val="512"] {background:rgba(199,125,255,.3);color:var(--purple);font-size:min(5.5vw,22px)}
.cell[data-val="1024"]{background:rgba(199,125,255,.45);color:var(--purple);font-size:min(5vw,18px)}
.cell[data-val="2048"]{background:linear-gradient(135deg,var(--gold),var(--coral));color:var(--ink);font-size:min(5vw,18px);box-shadow:0 0 30px rgba(255,209,102,.5)}
.game-msg{font-family:var(--f-display);font-size:16px;font-weight:700;color:var(--text-2);text-align:center}
.how-to{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:13px;color:var(--text-2);line-height:1.7;text-align:center}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-header">
    <a href="../games.html">← Oyunlar</a>
    <div class="game-title">2048</div>
    <div class="score-row">
      <div class="score-box"><div class="sb-label">Puan</div><div class="sb-val" id="scoreVal">0</div></div>
      <div class="score-box"><div class="sb-label">En İyi</div><div class="sb-val" id="bestVal">0</div></div>
    </div>
  </div>

  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="undo()">↩ Geri Al</button>
    <button class="btn btn-primary btn-sm" onclick="newGame()">↺ Yeni Oyun</button>
  </div>

  <div class="board" id="board"></div>

  <div class="game-msg" id="gameMsg"></div>

  <div class="how-to">
    🖥️ Klavye ok tuşları ile oyna<br>
    📱 Mobilde sürükle ile oyna<br>
    Aynı sayıları birleştirerek <strong style="color:var(--gold)">2048</strong>'e ulaş!
  </div>
</div>

<script>
let grid = Array.from({length:4},()=>Array(4).fill(0));
let score = 0, best = parseInt(localStorage.getItem('ep_2048_best')||'0');
let prevGrid = null, prevScore = 0;

document.getElementById('bestVal').textContent = best;

function newGame(){
  grid = Array.from({length:4},()=>Array(4).fill(0));
  score=0; prevGrid=null;
  document.getElementById('gameMsg').textContent='';
  addRandom(); addRandom();
  render();
}

function addRandom(){
  const empty=[];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c]===0) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const v=grid[r][c];
    const cell=document.createElement('div');
    cell.className='cell';
    if(v){cell.setAttribute('data-val',v);cell.textContent=v;}
    board.appendChild(cell);
  }
  document.getElementById('scoreVal').textContent=score;
}

function move(dir){
  prevGrid=grid.map(r=>[...r]); prevScore=score;
  let changed=false;
  const rot=(g,n)=>{for(let i=0;i<n;i++){const t=g.map((_,r)=>g.map((_,c)=>g[3-c][r]));g.length=0;g.push(...t);}};

  if(dir==='left') changed=slideLeft();
  else if(dir==='right'){rot(grid,2);changed=slideLeft();rot(grid,2);}
  else if(dir==='up'){rot(grid,3);changed=slideLeft();rot(grid,1);}
  else if(dir==='down'){rot(grid,1);changed=slideLeft();rot(grid,3);}

  if(changed){
    addRandom();
    if(score>best){best=score;localStorage.setItem('ep_2048_best',best);document.getElementById('bestVal').textContent=best;}
    render();
    checkEnd();
  }
}

function slideLeft(){
  let changed=false;
  for(let r=0;r<4;r++){
    let row=grid[r].filter(v=>v!==0);
    for(let i=0;i<row.length-1;i++){
      if(row[i]===row[i+1]){row[i]*=2;score+=row[i];row.splice(i+1,1);changed=true;}
    }
    while(row.length<4) row.push(0);
    if(row.some((v,i)=>v!==grid[r][i])) changed=true;
    grid[r]=row;
  }
  return changed;
}

function undo(){
  if(!prevGrid) return;
  grid=prevGrid.map(r=>[...r]); score=prevScore;
  prevGrid=null; render();
}

function checkEnd(){
  // Win?
  if(grid.some(r=>r.includes(2048))){
    document.getElementById('gameMsg').innerHTML='🏆 <span style="color:var(--gold)">2048\'e Ulaştın!</span>';
    try{const u=JSON.parse(localStorage.getItem('eduplay_user')||'{}');u.xp=(u.xp||0)+200;u.gamesPlayed=(u.gamesPlayed||0)+1;localStorage.setItem('eduplay_user',JSON.stringify(u));}catch(e){}
    return;
  }
  // Lose?
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    if(grid[r][c]===0) return;
    if(c<3&&grid[r][c]===grid[r][c+1]) return;
    if(r<3&&grid[r][c]===grid[r+1][c]) return;
  }
  document.getElementById('gameMsg').innerHTML='😔 <span style="color:var(--coral)">Oyun Bitti!</span>';
}

// Keyboard
document.addEventListener('keydown',e=>{
  const m={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down'};
  if(m[e.key]){e.preventDefault();move(m[e.key]);}
});

// Touch/swipe
let tx=0,ty=0;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){move(dx>0?'right':'left');}
  else{move(dy>0?'down':'up');}
},{passive:true});

newGame();
</script>
</body>
</html>
