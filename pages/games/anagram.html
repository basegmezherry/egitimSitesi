<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anagram — EduPlay</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .game-container{max-width:600px;margin:0 auto;padding:24px;}
    .game-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px;text-align:center;}
    .big-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
    .hint-box{background:rgba(0,245,212,0.07);border:1px solid rgba(0,245,212,0.2);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px;font-size:13px;color:var(--text-muted);}
    .shuffled-word{font-size:36px;font-weight:800;letter-spacing:12px;color:var(--primary);font-family:var(--font-display);margin:24px 0;text-shadow:0 0 30px rgba(0,245,212,0.4);}
    .letter-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0;}
    .letter-btn{width:44px;height:44px;background:var(--card);border:2px solid var(--border);border-radius:8px;font-size:20px;font-weight:700;color:var(--text);cursor:pointer;transition:var(--transition);font-family:var(--font-display);}
    .letter-btn:hover:not(:disabled){border-color:var(--primary);background:rgba(0,245,212,0.08);}
    .letter-btn:disabled{opacity:0.25;cursor:not-allowed;}
    .answer-row{display:flex;gap:8px;justify-content:center;min-height:52px;align-items:center;margin:16px 0;flex-wrap:wrap;}
    .answer-slot{width:44px;height:44px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:8px;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);color:var(--primary);}
    .answer-slot:hover{border-color:rgba(255,71,87,0.4);}
    .answer-slot.filled{background:rgba(0,245,212,0.08);border-color:rgba(0,245,212,0.3);}
    .answer-slot.correct{background:rgba(0,200,150,0.15);border-color:var(--success);}
    .answer-slot.wrong{background:rgba(255,71,87,0.1);border-color:var(--danger);}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:20px;font-family:var(--font-display);}
    .stat{text-align:center;}
    .stat-val{font-size:22px;font-weight:700;color:var(--primary);}
    .stat-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .action-row{display:flex;gap:10px;justify-content:center;margin-top:16px;}
    .progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:20px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.4s;}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="navbar-brand"><div class="logo-icon">🎓</div><span class="logo-text">EduPlay</span></a>
  <ul class="navbar-nav"><li><a href="../games.html">🎮 Oyunlar</a></li></ul>
  <div class="navbar-actions"><a href="../profile.html" class="btn-avatar"><span data-user-avatar>🎓</span></a></div>
  <button class="mobile-menu-btn">☰</button>
</nav>
<div class="page-wrapper">
  <div class="game-container">

    <div id="startScreen" class="game-screen">
      <div class="big-emoji">🔤</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:12px">Anagram</h2>
      <p style="color:var(--text-muted);margin-bottom:28px">Karışık harfleri doğru sıraya diz! 20 kelime, her biri için ipucu var.</p>
      <button class="btn btn-primary btn-lg" onclick="startGame()">🔤 Başlat</button>
    </div>

    <div id="gameScreen" style="display:none">
      <div class="stat-row">
        <div class="stat"><div class="stat-val" id="scoreD">0</div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="qNumD">1/20</div><div class="stat-lbl">Kelime</div></div>
        <div class="stat"><div class="stat-val" id="streakD">0🔥</div><div class="stat-lbl">Seri</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:5%"></div></div>
      <div class="hint-box" id="hintBox">İpucu yükleniyor...</div>
      <div class="shuffled-word" id="shuffleDisplay"></div>
      <div class="answer-row" id="answerRow"></div>
      <div class="letter-btns" id="letterBtns"></div>
      <div class="action-row">
        <button class="btn" onclick="clearAnswer()" style="background:rgba(255,71,87,0.1);border-color:var(--danger);color:var(--danger)">🗑 Temizle</button>
        <button class="btn btn-primary" onclick="checkAnswer()">✅ Kontrol Et</button>
        <button class="btn" onclick="skipWord()" style="background:rgba(255,255,255,0.04);color:var(--text-muted)">⏭ Geç</button>
      </div>
    </div>

    <div id="endScreen" class="game-screen" style="display:none">
      <div class="big-emoji" id="endEmoji">🏆</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:8px">Oyun Bitti!</h2>
      <p style="color:var(--text-muted);margin-bottom:24px" id="endMsg"></p>
      <div style="display:flex;gap:24px;justify-content:center;margin-bottom:32px">
        <div class="stat"><div class="stat-val" id="finalScore" style="font-size:36px"></div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="finalCorrect" style="font-size:36px;color:var(--success)"></div><div class="stat-lbl">Doğru</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="startGame()">🔄 Tekrar</button>
        <a href="../games.html" class="btn" style="background:rgba(255,255,255,0.04);border-color:var(--border)">← Oyunlar</a>
      </div>
    </div>

  </div>
</div>

<script src="../../js/main.js"></script>
<script>
const WORDS = [
  {word:'TÜRKÇE',hint:'Anadilimiz, konuştuğumuz dil'},
  {word:'MATEMATİK',hint:'Sayılar, şekiller, işlemler dersi'},
  {word:'COĞRAFYA',hint:'Dünya ve Türkiye\'yi inceleyen ders'},
  {word:'FİZİK',hint:'Kuvvet, hareket, enerji inceler'},
  {word:'KİMYA',hint:'Maddelerin yapısını inceler'},
  {word:'BİYOLOJİ',hint:'Canlıları inceleyen bilim dalı'},
  {word:'TARİH',hint:'Geçmişi araştıran bilim dalı'},
  {word:'FELSEFE',hint:'Varlık ve bilgiyi sorgular'},
  {word:'ASTRONOMI',hint:'Yıldız ve gezegenleri inceler'},
  {word:'EKONOMİ',hint:'Üretim ve tüketimi inceler'},
  {word:'DEMOKRASİ',hint:'Halk yönetimi sistemi'},
  {word:'CUMHURİYET',hint:'Türkiye\'nin yönetim biçimi'},
  {word:'ANAYASA',hint:'Temel kanunlar belgesi'},
  {word:'PARLAMENTO',hint:'Yasaları çıkaran meclis'},
  {word:'ATATÜRK',hint:'Türkiye Cumhuriyeti\'nin kurucusu'},
  {word:'İSTANBUL',hint:'Türkiye\'nin en kalabalık şehri'},
  {word:'ANKARA',hint:'Türkiye\'nin başkenti'},
  {word:'KARADENİZ',hint:'Türkiye\'nin kuzeyindeki deniz'},
  {word:'ANADOLU',hint:'Türkiye\'nin Asya toprakları'},
  {word:'OSMANLICA',hint:'Osmanlı döneminde kullanılan yazı'},
];

let questions=[], current=0, score=0, correct=0, streak=0;
let answer=[], usedIndices=[], shuffled=[];

function shuffleArr(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  questions=shuffleArr(WORDS).slice(0,20);
  current=0;score=0;correct=0;streak=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  loadWord();
}

function loadWord(){
  if(current>=questions.length){endGame();return;}
  const q=questions[current];
  answer=[];
  usedIndices=[];
  shuffled=shuffleArr(q.word.split(''));
  // Karıştırma kelimeyle aynı olmasın
  while(shuffled.join('')===q.word) shuffled=shuffleArr(q.word.split(''));

  document.getElementById('hintBox').textContent='💡 ' + q.hint;
  document.getElementById('shuffleDisplay').textContent=shuffled.join(' ');
  document.getElementById('qNumD').textContent=`${current+1}/20`;
  document.getElementById('streakD').textContent=`${streak}🔥`;
  document.getElementById('progFill').style.width=`${((current)/20)*100}%`;

  renderLetterBtns();
  renderAnswerRow();
}

function renderLetterBtns(){
  const c=document.getElementById('letterBtns');
  c.innerHTML='';
  shuffled.forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='letter-btn';
    b.textContent=l;
    b.disabled=usedIndices.includes(i);
    b.onclick=()=>pickLetter(i);
    c.appendChild(b);
  });
}

function renderAnswerRow(){
  const c=document.getElementById('answerRow');
  const word=questions[current].word;
  c.innerHTML='';
  for(let i=0;i<word.length;i++){
    const s=document.createElement('div');
    s.className='answer-slot'+(answer[i]!==undefined?' filled':'');
    s.textContent=answer[i]!==undefined?answer[i].letter:'';
    if(answer[i]!==undefined) s.onclick=()=>removeLetter(i);
    c.appendChild(s);
  }
}

function pickLetter(idx){
  const word=questions[current].word;
  if(answer.length>=word.length||usedIndices.includes(idx))return;
  const slot=answer.length;
  answer.push({letter:shuffled[idx],srcIdx:idx});
  usedIndices.push(idx);
  renderLetterBtns();
  renderAnswerRow();
}

function removeLetter(slot){
  const removed=answer.splice(slot,1)[0];
  usedIndices=usedIndices.filter(i=>i!==removed.srcIdx);
  renderLetterBtns();
  renderAnswerRow();
}

function clearAnswer(){
  answer=[];usedIndices=[];
  renderLetterBtns();renderAnswerRow();
}

function checkAnswer(){
  const word=questions[current].word;
  const slots=document.getElementById('answerRow').children;
  const formed=answer.map(a=>a.letter).join('');
  if(formed.length<word.length){alert('Tüm harfleri yerleştir!');return;}

  const isCorrect=formed===word;
  Array.from(slots).forEach(s=>{
    s.className='answer-slot '+(isCorrect?'correct':'wrong');
  });

  setTimeout(()=>{
    if(isCorrect){score+=100+streak*10;correct++;streak++;}
    else{streak=0;}
    document.getElementById('scoreD').textContent=score;
    current++;
    loadWord();
  },800);
}

function skipWord(){
  streak=0;
  current++;
  loadWord();
}

function endGame(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='block';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalCorrect').textContent=correct+'/20';
  const pct=correct/20;
  document.getElementById('endEmoji').textContent=pct>=0.8?'🏆':pct>=0.5?'⭐':'💪';
  document.getElementById('endMsg').textContent=pct>=0.8?'Mükemmel! Kelime ustasısın!':pct>=0.5?'İyi iş! Biraz daha pratik yap.':'Devam et, gelişiyorsun!';
  if(window.EduPlay) EduPlay.addXP(Math.floor(score/10));
}
</script>
</body>
</html>
