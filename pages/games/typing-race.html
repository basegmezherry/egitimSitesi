<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yazma Yarışı — EduPlay</title>
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
body{background:var(--ink);min-height:100vh}
.game-wrap{max-width:720px;margin:0 auto;padding:80px 20px 40px;display:flex;flex-direction:column;gap:20px}
.game-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.game-header a{color:var(--text-2);text-decoration:none;font-size:13px}
.game-title{font-family:var(--f-display);font-size:20px;font-weight:800}
.stats-row{display:flex;gap:12px;flex-wrap:wrap}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;text-align:center;min-width:80px}
.sp-val{font-family:var(--f-mono);font-size:20px;font-weight:700;color:var(--cyan)}
.sp-lbl{font-size:10px;color:var(--text-2);margin-top:2px}
.text-display{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;font-family:var(--f-mono);font-size:17px;line-height:1.9;letter-spacing:.03em;min-height:120px;position:relative}
.char{transition:color .05s}
.char.correct{color:var(--lime)}
.char.wrong{color:var(--coral);background:rgba(255,107,107,.15);border-radius:2px}
.char.current{color:var(--text);border-bottom:2px solid var(--cyan);animation:blink .8s step-end infinite}
.char.pending{color:var(--text-3)}
@keyframes blink{0%,100%{border-color:var(--cyan)}50%{border-color:transparent}}
.typing-input{width:100%;background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:12px;padding:14px 18px;font-family:var(--f-mono);font-size:15px;color:var(--text);outline:none;transition:border-color var(--t-fast);resize:none}
.typing-input:focus{border-color:var(--cyan)}
.typing-input:disabled{opacity:.5;cursor:not-allowed}
.progress-wrap{background:rgba(255,255,255,.06);border-radius:999px;height:6px;overflow:hidden}
.progress-inner{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--lime));transition:width .3s}
.result-box{background:linear-gradient(135deg,rgba(99,219,255,.08),rgba(184,255,78,.04));border:1px solid rgba(99,219,255,.2);border-radius:20px;padding:32px;text-align:center;display:none}
.result-box.show{display:block}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;margin:20px 0}
.result-stat{background:rgba(255,255,255,.04);border-radius:12px;padding:14px}
.rs-val{font-family:var(--f-display);font-size:26px;font-weight:800;color:var(--cyan)}
.rs-lbl{font-size:11px;color:var(--text-2);margin-top:4px}
.word-count-btns{display:flex;gap:8px}
.wc-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--f-body);font-size:12.5px;font-weight:600;transition:all var(--t-fast)}
.wc-btn.active{background:rgba(99,219,255,.1);border-color:var(--cyan);color:var(--cyan)}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-header">
    <a href="../games.html">← Oyunlar</a>
    <div class="game-title">⌨️ Yazma Yarışı</div>
    <div class="word-count-btns">
      <button class="wc-btn active" onclick="setMode(25,this)">25 Kelime</button>
      <button class="wc-btn" onclick="setMode(50,this)">50 Kelime</button>
      <button class="wc-btn" onclick="setMode(100,this)">100 Kelime</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-pill"><div class="sp-val" id="wpmVal">0</div><div class="sp-lbl">WPM</div></div>
    <div class="stat-pill"><div class="sp-val" id="accVal">100</div><div class="sp-lbl">Doğruluk %</div></div>
    <div class="stat-pill"><div class="sp-val" id="timeVal">60</div><div class="sp-lbl">Süre</div></div>
    <div class="stat-pill"><div class="sp-val" id="charsVal">0</div><div class="sp-lbl">Karakter</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-inner" id="progressBar" style="width:0%"></div></div>

  <div class="text-display" id="textDisplay"></div>

  <textarea class="typing-input" id="typingInput" placeholder="Buraya yaz…" rows="2" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>

  <div style="display:flex;gap:10px;justify-content:center">
    <button class="btn btn-ghost btn-sm" onclick="newGame()">↺ Yeni Metin</button>
    <button class="btn btn-primary btn-sm" onclick="startGame()" id="startBtn">▶ Başla</button>
  </div>

  <div class="result-box" id="resultBox">
    <div style="font-size:40px;margin-bottom:8px">🏆</div>
    <div style="font-family:var(--f-display);font-size:22px;font-weight:800;color:var(--lime);margin-bottom:4px">Tamamlandı!</div>
    <div class="result-grid">
      <div class="result-stat"><div class="rs-val" id="finalWPM">0</div><div class="rs-lbl">WPM</div></div>
      <div class="result-stat"><div class="rs-val" id="finalAcc">0</div><div class="rs-lbl">Doğruluk %</div></div>
      <div class="result-stat"><div class="rs-val" id="finalChars">0</div><div class="rs-lbl">Karakter</div></div>
      <div class="result-stat"><div class="rs-val" id="finalScore">0</div><div class="rs-lbl">Puan</div></div>
    </div>
    <button class="btn btn-primary" onclick="newGame()">Tekrar Oyna</button>
  </div>
</div>

<script>
const WORD_POOL = ['araba','kitap','okul','öğrenci','matematik','bilim','tarih','coğrafya','spor','müzik','sanat','dans','yazı','okuma','anlama','düşünce','bilgi','öğrenme','eğitim','başarı','çalışma','ders','sınav','not','proje','ödev','kütüphane','kalem','silgi','defter','taşıt','uçak','gemi','tren','bisiklet','meyve','elma','armut','üzüm','kiraz','portakal','muz','çilek','karpuz','kavun','hayvan','kedi','köpek','kuş','balık','at','fil','aslan','kaplan','tavşan','sincap','renk','kırmızı','mavi','yeşil','sarı','turuncu','mor','pembe','siyah','beyaz','gri','sayı','iki','üç','dört','beş','altı','yedi','sekiz','dokuz','on','yüz','bin','zaman','gün','gece','sabah','akşam','hafta','ay','yıl','saat','dakika','yer','ev','okul','park','yol','köy','şehir','ülke','dünya','ada','dağ','nehir','göl','deniz','orman','çöl'];

let words = [], typed = '', pos = 0, correct = 0, wrong = 0, started = false, timerInterval = null, timeLeft = 60, mode = 25, startTime = null;

function setMode(n, btn){
  mode = n;
  document.querySelectorAll('.wc-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  newGame();
}

function generateText(n){
  const pool = [...WORD_POOL]; shuffle(pool);
  return pool.slice(0,n).join(' ');
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function newGame(){
  clearInterval(timerInterval);
  const text = generateText(mode);
  words = text.split('');
  typed = ''; pos = 0; correct = 0; wrong = 0; started = false;
  timeLeft = mode <= 25 ? 60 : mode <= 50 ? 90 : 120;
  document.getElementById('timeVal').textContent = timeLeft;
  document.getElementById('wpmVal').textContent = 0;
  document.getElementById('accVal').textContent = 100;
  document.getElementById('charsVal').textContent = 0;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('typingInput').value = '';
  document.getElementById('typingInput').disabled = false;
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('startBtn').style.display = 'inline-flex';
  renderText();
}

function renderText(){
  const display = document.getElementById('textDisplay');
  display.innerHTML = words.map((ch,i) => {
    let cls = 'pending';
    if(i < pos) cls = typed[i] === ch ? 'correct' : 'wrong';
    else if(i === pos) cls = 'current';
    return `<span class="char ${cls}">${ch === ' ' ? '&nbsp;' : ch}</span>`;
  }).join('');
  // Scroll current char into view
  const cur = display.querySelector('.current');
  if(cur) cur.scrollIntoView({block:'nearest'});
}

function startGame(){
  document.getElementById('typingInput').focus();
  document.getElementById('startBtn').style.display = 'none';
  startTime = Date.now();
  started = true;
  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById('timeVal').textContent = timeLeft;
    updateWPM();
    if(timeLeft <= 0) endGame();
  },1000);
}

document.getElementById('typingInput').addEventListener('input', e => {
  if(!started) return;
  const val = e.target.value;
  const lastChar = val[val.length-1];
  if(!lastChar) return;
  e.target.value = '';

  if(pos < words.length){
    typed += lastChar;
    if(lastChar === words[pos]) correct++;
    else wrong++;
    pos++;
    document.getElementById('charsVal').textContent = pos;
    document.getElementById('progressBar').style.width = (pos/words.length*100)+'%';
    updateWPM();
    renderText();
    if(pos >= words.length) endGame();
  }
});

function updateWPM(){
  if(!startTime) return;
  const elapsed = (Date.now()-startTime)/60000;
  const wpm = elapsed > 0 ? Math.round((correct/5)/elapsed) : 0;
  const acc = pos > 0 ? Math.round((correct/pos)*100) : 100;
  document.getElementById('wpmVal').textContent = wpm;
  document.getElementById('accVal').textContent = acc;
}

function endGame(){
  clearInterval(timerInterval);
  document.getElementById('typingInput').disabled = true;
  const elapsed = (Date.now()-startTime)/60000;
  const wpm = elapsed > 0 ? Math.round((correct/5)/elapsed) : 0;
  const acc = pos > 0 ? Math.round((correct/pos)*100) : 100;
  const score = wpm * (acc/100) * 10;
  document.getElementById('finalWPM').textContent = wpm;
  document.getElementById('finalAcc').textContent = acc;
  document.getElementById('finalChars').textContent = pos;
  document.getElementById('finalScore').textContent = Math.round(score);
  document.getElementById('resultBox').classList.add('show');
  try{const u=JSON.parse(localStorage.getItem('eduplay_user')||'{}');u.xp=(u.xp||0)+Math.round(score/5);u.gamesPlayed=(u.gamesPlayed||0)+1;localStorage.setItem('eduplay_user',JSON.stringify(u));}catch(e){}
}

document.getElementById('typingInput').addEventListener('keydown', e => {
  if(e.key==='Tab'){e.preventDefault();}
  if(!started && e.key.length===1) startGame();
});

newGame();
</script>
</body>
</html>
