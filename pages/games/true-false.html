<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doğru/Yanlış Koşusu — EduPlay</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .game-container{max-width:600px;margin:0 auto;padding:24px;}
    .game-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px;text-align:center;}
    .big-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:16px;font-family:var(--font-display);}
    .stat{text-align:center;}
    .stat-val{font-size:22px;font-weight:700;color:var(--primary);}
    .stat-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .timer-ring{width:80px;height:80px;margin:0 auto 20px;position:relative;}
    .timer-ring svg{transform:rotate(-90deg);}
    .timer-ring circle{fill:none;stroke-width:6;}
    .timer-ring .bg{stroke:rgba(255,255,255,0.06);}
    .timer-ring .fg{stroke:var(--primary);stroke-dasharray:220;stroke-dashoffset:0;transition:stroke-dashoffset 0.1s linear;}
    .timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:800;font-family:var(--font-display);color:var(--text);}
    .statement-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;font-size:18px;font-weight:600;color:var(--text);line-height:1.6;min-height:100px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;text-align:center;}
    .tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .tf-btn{padding:20px;border-radius:var(--radius-sm);font-size:22px;font-weight:800;font-family:var(--font-display);cursor:pointer;border:2px solid transparent;transition:all 0.2s;letter-spacing:1px;}
    .tf-btn.true-btn{background:rgba(0,200,150,0.1);border-color:var(--success);color:var(--success);}
    .tf-btn.false-btn{background:rgba(255,71,87,0.08);border-color:var(--danger);color:var(--danger);}
    .tf-btn.true-btn:hover{background:rgba(0,200,150,0.2);transform:scale(1.03);}
    .tf-btn.false-btn:hover{background:rgba(255,71,87,0.15);transform:scale(1.03);}
    .tf-btn.flash-correct{animation:flashG 0.4s;}
    .tf-btn.flash-wrong{animation:flashR 0.4s;}
    @keyframes flashG{0%,100%{background:rgba(0,200,150,0.1);}50%{background:rgba(0,200,150,0.5);}}
    @keyframes flashR{0%,100%{background:rgba(255,71,87,0.08);}50%{background:rgba(255,71,87,0.4);}}
    .progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:20px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.4s;}
    .category-tag{font-size:11px;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="navbar-brand"><div class="logo-icon">🎓</div><span class="logo-text">EduPlay</span></a>
  <ul class="navbar-nav"><li><a href="../games.html">🎮 Oyunlar</a></li></ul>
  <div class="navbar-actions"><a href="../profile.html" class="btn-avatar"><span data-user-avatar>🎓</span></a></div>
  <button class="mobile-menu-btn">☰</button>
</nav>
<div class="page-wrapper">
  <div class="game-container">
    <div id="startScreen" class="game-screen">
      <div class="big-emoji">⚡</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:12px">Doğru/Yanlış Koşusu</h2>
      <p style="color:var(--text-muted);margin-bottom:28px">Her ifadeye 5 saniyede karar ver! 25 ifade, hızlı düşün.</p>
      <button class="btn btn-primary btn-lg" onclick="startGame()">⚡ Başlat</button>
    </div>

    <div id="gameScreen" style="display:none">
      <div class="stat-row">
        <div class="stat"><div class="stat-val" id="scoreD">0</div><div class="stat-lbl">Puan</div></div>
        <div class="stat">
          <div class="timer-ring">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle class="bg" cx="40" cy="40" r="35"/>
              <circle class="fg" id="timerCircle" cx="40" cy="40" r="35" style="stroke-dasharray:220;stroke-dashoffset:0;"/>
            </svg>
            <div class="timer-num" id="timerNum">5</div>
          </div>
        </div>
        <div class="stat"><div class="stat-val" id="streakD">0🔥</div><div class="stat-lbl">Seri</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:4%"></div></div>
      <div class="category-tag" id="catTag">KATEGORİ</div>
      <div class="statement-card" id="stmtCard">İfade yükleniyor...</div>
      <div class="tf-btns">
        <button class="tf-btn true-btn" id="trueBtn" onclick="answer(true)">✅ DOĞRU</button>
        <button class="tf-btn false-btn" id="falseBtn" onclick="answer(false)">❌ YANLIŞ</button>
      </div>
    </div>

    <div id="endScreen" class="game-screen" style="display:none">
      <div class="big-emoji" id="endEmoji">🏆</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:8px">Bitti!</h2>
      <p style="color:var(--text-muted);margin-bottom:24px" id="endMsg"></p>
      <div style="display:flex;gap:24px;justify-content:center;margin-bottom:32px">
        <div class="stat"><div class="stat-val" id="finalScore" style="font-size:36px"></div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="finalCorrect" style="font-size:36px;color:var(--success)"></div><div class="stat-lbl">Doğru</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="startGame()">🔄 Tekrar</button>
        <a href="../games.html" class="btn" style="background:rgba(255,255,255,0.04);border-color:var(--border)">← Oyunlar</a>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script>
const STATEMENTS = [
  {text:'Türkiye\'nin başkenti İstanbul\'dur.',correct:false,cat:'Coğrafya'},
  {text:'Ankara, Türkiye\'nin başkentidir.',correct:true,cat:'Coğrafya'},
  {text:'Türkiye 81 ilden oluşur.',correct:true,cat:'Coğrafya'},
  {text:'Karadeniz, Türkiye\'nin güneyinde bulunur.',correct:false,cat:'Coğrafya'},
  {text:'3 × 7 = 21',correct:true,cat:'Matematik'},
  {text:'4² = 8',correct:false,cat:'Matematik'},
  {text:'√25 = 5',correct:true,cat:'Matematik'},
  {text:'2/4 = 0,75',correct:false,cat:'Matematik'},
  {text:'Dünya Güneş\'in etrafında döner.',correct:true,cat:'Fen'},
  {text:'Ay, kendi ışığıyla parlar.',correct:false,cat:'Fen'},
  {text:'Oksijen sembolü O\'dur.',correct:true,cat:'Fen'},
  {text:'Su, H₃O formülüyle gösterilir.',correct:false,cat:'Fen'},
  {text:'Osmanlı Devleti 1299\'da kuruldu.',correct:true,cat:'Tarih'},
  {text:'Kurtuluş Savaşı 1925\'te bitti.',correct:false,cat:'Tarih'},
  {text:'Atatürk 1923\'te Cumhuriyet\'i ilan etti.',correct:true,cat:'Tarih'},
  {text:'İstanbul\'un fethinde top kullanılmadı.',correct:false,cat:'Tarih'},
  {text:'\"Mavi\" İngilizce\'de "Blue" demektir.',correct:true,cat:'İngilizce'},
  {text:'\"Dog\" Türkçede \"kedi\" demektir.',correct:false,cat:'İngilizce'},
  {text:'\"Happy\" sıfat (adjective) grubundandır.',correct:true,cat:'İngilizce'},
  {text:'\"Run\" fiil (verb) grubundandır.',correct:true,cat:'İngilizce'},
  {text:'Namaz İslam\'ın beş şartından biridir.',correct:true,cat:'Din'},
  {text:'Ramazan ayında oruç farz değildir.',correct:false,cat:'Din'},
  {text:'Düzenli spor yapmak sağlığa yararlıdır.',correct:true,cat:'Sağlık'},
  {text:'Kalp bir kas organıdır.',correct:true,cat:'Fen'},
  {text:'Fotossentez gece gerçekleşir.',correct:false,cat:'Fen'},
];

let questions=[], current=0, score=0, correct=0, streak=0;
let timerInterval=null, timeLeft=0;

function shuffleArr(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  questions=shuffleArr(STATEMENTS).slice(0,25);
  current=0;score=0;correct=0;streak=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  loadStatement();
}

function loadStatement(){
  if(current>=questions.length){endGame();return;}
  clearInterval(timerInterval);
  const q=questions[current];
  document.getElementById('stmtCard').textContent=q.text;
  document.getElementById('catTag').textContent=q.cat.toUpperCase();
  document.getElementById('progFill').style.width=`${(current/25)*100}%`;
  document.getElementById('streakD').textContent=`${streak}🔥`;
  document.getElementById('trueBtn').disabled=false;
  document.getElementById('falseBtn').disabled=false;
  startTimer();
}

function startTimer(){
  timeLeft=5;
  updateTimer();
  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    updateTimer();
    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },100);
}

function updateTimer(){
  const t=Math.ceil(timeLeft);
  document.getElementById('timerNum').textContent=t;
  const pct=timeLeft/5;
  document.getElementById('timerCircle').style.strokeDashoffset=220*(1-pct);
  document.getElementById('timerCircle').style.stroke=pct>0.5?'var(--primary)':pct>0.25?'var(--warning)':'var(--danger)';
}

function timeExpired(){
  streak=0;
  document.getElementById('trueBtn').disabled=true;
  document.getElementById('falseBtn').disabled=true;
  current++;
  setTimeout(loadStatement,300);
}

function answer(userAnswer){
  clearInterval(timerInterval);
  document.getElementById('trueBtn').disabled=true;
  document.getElementById('falseBtn').disabled=true;
  const q=questions[current];
  const isCorrect=userAnswer===q.correct;
  const btnId=userAnswer?'trueBtn':'falseBtn';
  document.getElementById(btnId).classList.add(isCorrect?'flash-correct':'flash-wrong');
  if(isCorrect){score+=50+streak*5;correct++;streak++;}
  else{streak=0;}
  document.getElementById('scoreD').textContent=score;
  current++;
  setTimeout(()=>{
    document.getElementById('trueBtn').classList.remove('flash-correct','flash-wrong');
    document.getElementById('falseBtn').classList.remove('flash-correct','flash-wrong');
    loadStatement();
  },500);
}

function endGame(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='block';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalCorrect').textContent=correct+'/25';
  const pct=correct/25;
  document.getElementById('endEmoji').textContent=pct>=0.8?'🏆':pct>=0.5?'⭐':'💪';
  document.getElementById('endMsg').textContent=pct>=0.8?'Harika! Çok hızlısın!':pct>=0.5?'İyi! Daha hızlanabilirsin.':'Pratik yaparsan daha iyi olursun!';
  if(window.EduPlay) EduPlay.addXP(Math.floor(score/10));
}
</script>
</body>
</html>
