<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Adam Asmaca — EduPlay</title>
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:var(--ink);min-height:100vh}
.game-wrap{max-width:560px;margin:0 auto;padding:80px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:20px}
.game-header{width:100%;display:flex;align-items:center;justify-content:space-between}
.game-header a{color:var(--text-2);text-decoration:none;font-size:13px}
.game-title{font-family:var(--f-display);font-size:20px;font-weight:800}
.hangman-svg{width:180px;height:180px;margin:0 auto}
.word-display{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.letter-slot{width:36px;height:36px;border-bottom:2px solid rgba(255,255,255,.2);display:flex;align-items:flex-end;justify-content:center;font-family:var(--f-mono);font-size:20px;font-weight:700;color:var(--text);padding-bottom:2px}
.letter-slot.revealed{border-color:var(--cyan);animation:popIn .3s ease}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.letter-slot.wrong-guess{color:var(--coral);border-color:var(--coral)}
.hint-text{font-size:13px;color:var(--text-2);text-align:center;max-width:380px;background:rgba(255,255,255,.03);border-radius:8px;padding:8px 14px}
.keyboard{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;width:100%;max-width:400px}
.key-btn{aspect-ratio:1;background:var(--card);border:1px solid var(--border);border-radius:7px;font-family:var(--f-mono);font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all var(--t-fast);display:flex;align-items:center;justify-content:center}
.key-btn:hover:not(:disabled){background:rgba(99,219,255,.1);border-color:var(--cyan);color:var(--cyan)}
.key-btn:disabled{opacity:.35;cursor:not-allowed}
.key-btn.correct{background:rgba(184,255,78,.15);border-color:var(--lime);color:var(--lime)}
.key-btn.wrong{background:rgba(255,107,107,.1);border-color:var(--coral);color:var(--coral)}
.lives-row{display:flex;gap:5px}
.life{font-size:18px;transition:all .3s;filter:grayscale(0)}
.life.lost{filter:grayscale(1);opacity:.3}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.ctab{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-2);font-family:var(--f-body);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--t-fast)}
.ctab:hover,.ctab.active{border-color:var(--cyan);background:rgba(99,219,255,.08);color:var(--cyan)}
.game-over{text-align:center;padding:20px}
.go-title{font-family:var(--f-display);font-size:24px;font-weight:800;margin-bottom:8px}
.go-word{font-family:var(--f-mono);font-size:20px;color:var(--gold);margin-bottom:16px}
.stats-mini{display:flex;gap:16px;justify-content:center;font-family:var(--f-mono);font-size:13px;color:var(--text-2)}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-header">
    <a href="../games.html">← Oyunlar</a>
    <div class="game-title">🪢 Adam Asmaca</div>
    <button class="btn btn-primary btn-sm" onclick="newGame()">↺ Yeni</button>
  </div>

  <div class="cat-tabs" id="catTabs"></div>

  <div class="lives-row" id="livesRow"></div>

  <svg class="hangman-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Sehpa -->
    <line x1="20" y1="190" x2="180" y2="190" stroke="rgba(255,255,255,.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="190" x2="60" y2="10" stroke="rgba(255,255,255,.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="10" x2="130" y2="10" stroke="rgba(255,255,255,.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="10" x2="130" y2="35" stroke="rgba(255,255,255,.15)" stroke-width="3" stroke-linecap="round"/>
    <!-- Adam parçaları (id ile kontrol) -->
    <circle id="h_head" cx="130" cy="50" r="15" stroke="#ff6b6b" stroke-width="2.5" display="none"/>
    <line id="h_body" x1="130" y1="65" x2="130" y2="110" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" display="none"/>
    <line id="h_arm_l" x1="130" y1="75" x2="108" y2="95" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" display="none"/>
    <line id="h_arm_r" x1="130" y1="75" x2="152" y2="95" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" display="none"/>
    <line id="h_leg_l" x1="130" y1="110" x2="110" y2="138" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" display="none"/>
    <line id="h_leg_r" x1="130" y1="110" x2="150" y2="138" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" display="none"/>
  </svg>

  <div class="hint-text" id="hintText">Kategori yükleniyor…</div>
  <div class="word-display" id="wordDisplay"></div>

  <div class="stats-mini">
    <span>Toplam: <span id="totalGames" style="color:var(--cyan)">0</span></span>
    <span>Kazanılan: <span id="wonGames" style="color:var(--lime)">0</span></span>
    <span>Seri: <span id="streakGames" style="color:var(--gold)">0</span></span>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <div class="game-over" id="gameOver" style="display:none">
    <div class="go-title" id="goTitle"></div>
    <div class="go-word" id="goWord"></div>
    <button class="btn btn-primary" onclick="newGame()">↺ Tekrar Oyna</button>
  </div>
</div>

<script>
const WORDS = {
  'Hayvanlar': [
    {word:'ASLAN',hint:'Afrika\'nın kral hayvanı'},
    {word:'PENGUEN',hint:'Buzda yaşayan kuş'},
    {word:'KANGURU',hint:'Yavrusunu kesesinde taşır'},
    {word:'TIMSAH',hint:'Nil nehrinin dev sürüngeni'},
    {word:'YUNUS',hint:'Zeki bir deniz memelisi'},
    {word:'KARTAL',hint:'Gökyüzünün hakimi'},
    {word:'PANDA',hint:'Bambu yiyen Çin ayısı'},
    {word:'ZEBRA',hint:'Çizgili at benzeri hayvan'},
    {word:'GERGEDAN',hint:'Burnunda boynuz var'},
    {word:'FLAMINGO',hint:'Pembe renkli uzun bacaklı kuş'},
  ],
  'Bilim': [
    {word:'ATOM',hint:'Maddenin yapı taşı'},
    {word:'KLOROFIL',hint:'Bitkilere yeşil renk veren pigment'},
    {word:'FOTOSSENTEZ',hint:'Bitkinin güneşle yaptığı'},
    {word:'VOLKAN',hint:'Yerden lav püskürtür'},
    {word:'GALAKSI',hint:'Milyarlarca yıldız topluluğu'},
    {word:'ELEKTRON',hint:'Negatif yüklü temel parçacık'},
    {word:'OZON',hint:'Güneşten koruyan atmosfer tabakası'},
    {word:'DENEY',hint:'Bilimsel araştırma yöntemi'},
    {word:'PROTON',hint:'Pozitif yüklü atom parçacığı'},
    {word:'MAGMA',hint:'Yer altındaki erimiş kaya'},
  ],
  'Coğrafya': [
    {word:'ISTANBUL',hint:'İki kıtayı birleştiren şehir'},
    {word:'AKDENIZ',hint:'Türkiye\'nin güneyindeki deniz'},
    {word:'ANADOLU',hint:'Türkiye\'nin Asya yakası'},
    {word:'BOSPOR',hint:'İstanbul Boğazı\'nın Latince adı'},
    {word:'HIMALAYA',hint:'Dünyanın en yüksek dağ sırası'},
    {word:'AMAZON',hint:'Dünyanın en uzun nehri'},
    {word:'SAHRA',hint:'Dünyanın en büyük sıcak çölü'},
    {word:'KARADENIZ',hint:'Türkiye\'nin kuzeyindeki deniz'},
    {word:'ATATÜRK',hint:'Türkiye\'nin kurucusu'},
    {word:'PAMUKKALE',hint:'Beyaz travertenleriyle ünlü'},
  ],
  'Matematik': [
    {word:'KESIR',hint:'Payda üzerinde pay'},
    {word:'CEBIRSEL',hint:'Harf kullanan matematik dalı'},
    {word:'DENKLEM',hint:'İki tarafı eşit olan ifade'},
    {word:'GEOMETRI',hint:'Şekiller ve uzayı inceler'},
    {word:'INTEGRAL',hint:'Calculus\'un temel işlemi'},
    {word:'KAREKÖK',hint:'Karenin tersi işlemi'},
    {word:'FAKTORYEL',hint:'n! sembolüyle gösterilir'},
    {word:'PARABOL',hint:'İkinci dereceden eğri'},
    {word:'LOGARITMA',hint:'Üs almanın tersi'},
    {word:'TRIGONOMETRI',hint:'Açı ve kenar ilişkileri'},
  ],
};

const PARTS = ['h_head','h_body','h_arm_l','h_arm_r','h_leg_l','h_leg_r'];
const MAX_WRONG = 6;
let word='', hint='', guessed=new Set(), wrong=0, cat='Hayvanlar';
let totalGames=0, wonGames=0, streak=0;

function renderCats(){
  document.getElementById('catTabs').innerHTML = Object.keys(WORDS).map(c=>
    `<button class="ctab ${c===cat?'active':''}" onclick="setCat('${c}',this)">${c}</button>`).join('');
}

function setCat(c, btn){
  cat=c;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  newGame();
}

function newGame(){
  const pool = WORDS[cat];
  const item = pool[Math.floor(Math.random()*pool.length)];
  word = item.word; hint = item.hint;
  guessed = new Set(); wrong = 0;
  document.getElementById('gameOver').style.display = 'none';
  PARTS.forEach(id=>document.getElementById(id).setAttribute('display','none'));
  renderWord(); renderKeyboard(); renderLives();
  document.getElementById('hintText').textContent = '💡 ' + hint;
}

function renderWord(){
  document.getElementById('wordDisplay').innerHTML = word.split('').map(ch=>`
    <div class="letter-slot ${guessed.has(ch)?'revealed':''}">
      ${guessed.has(ch)?ch:'\u00A0'}
    </div>`).join('');
}

function renderKeyboard(){
  const LETTERS = 'ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ';
  document.getElementById('keyboard').innerHTML = LETTERS.split('').map(l=>`
    <button class="key-btn ${guessed.has(l)?(word.includes(l)?'correct':'wrong'):''}"
      ${guessed.has(l)?'disabled':''} onclick="guess('${l}')">${l}</button>`).join('');
}

function renderLives(){
  const lives = MAX_WRONG - wrong;
  document.getElementById('livesRow').innerHTML = Array.from({length:MAX_WRONG},(_,i)=>`
    <span class="life ${i>=lives?'lost':''}">❤️</span>`).join('');
}

function guess(letter){
  guessed.add(letter);
  if(!word.includes(letter)){
    wrong++;
    document.getElementById(PARTS[wrong-1])?.setAttribute('display','');
  }
  renderWord(); renderKeyboard(); renderLives();

  if(word.split('').every(ch=>guessed.has(ch))){
    // Win
    wonGames++; streak++; totalGames++;
    updateStats(); showOver(true);
    try{const u=JSON.parse(localStorage.getItem('eduplay_user')||'{}');u.xp=(u.xp||0)+50;u.gamesPlayed=(u.gamesPlayed||0)+1;localStorage.setItem('eduplay_user',JSON.stringify(u));}catch(e){}
  } else if(wrong>=MAX_WRONG){
    // Lose
    streak=0; totalGames++;
    // Reveal
    word.split('').forEach(ch=>guessed.add(ch));
    renderWord();
    setTimeout(()=>showOver(false),500);
    updateStats();
  }
}

function showOver(won){
  const el = document.getElementById('gameOver');
  el.style.display = 'block';
  document.getElementById('goTitle').innerHTML = won
    ? '<span style="color:var(--lime)">🎉 Kazandın!</span>'
    : '<span style="color:var(--coral)">😔 Kaybettin!</span>';
  document.getElementById('goWord').textContent = 'Kelime: ' + word;
}

function updateStats(){
  document.getElementById('totalGames').textContent = totalGames;
  document.getElementById('wonGames').textContent = wonGames;
  document.getElementById('streakGames').textContent = streak;
}

document.addEventListener('keydown',e=>{
  const key = e.key.toUpperCase();
  const LETTERS = 'ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ';
  if(LETTERS.includes(key) && !guessed.has(key)) guess(key);
});

renderCats();
newGame();
</script>
</body>
</html>
