<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Boşluk Doldur — EduPlay</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <style>
    .game-container{max-width:600px;margin:0 auto;padding:24px;}
    .game-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;text-align:center;}
    .big-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:16px;}
    .stat{text-align:center;}
    .stat-val{font-size:22px;font-weight:700;color:var(--primary);font-family:var(--font-display);}
    .stat-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .sentence-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;margin:16px 0;min-height:80px;display:flex;align-items:center;justify-content:center;}
    .sentence-text{font-size:17px;color:var(--text);line-height:1.8;font-weight:500;}
    .blank{display:inline-block;min-width:80px;height:28px;background:rgba(0,245,212,0.08);border-bottom:3px solid var(--primary);border-radius:4px 4px 0 0;vertical-align:bottom;padding:0 8px;text-align:center;font-weight:800;color:var(--primary);font-family:var(--font-display);}
    .blank.correct{border-color:var(--success);background:rgba(0,200,150,0.15);color:var(--success);}
    .blank.wrong{border-color:var(--danger);background:rgba(255,71,87,0.1);color:var(--danger);}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
    .opt-btn{background:rgba(255,255,255,0.03);border:2px solid var(--border);border-radius:10px;padding:14px 12px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);}
    .opt-btn:hover:not(:disabled){border-color:rgba(0,245,212,0.4);background:rgba(0,245,212,0.05);}
    .opt-btn.correct{border-color:var(--success);background:rgba(0,200,150,0.15);color:var(--success);}
    .opt-btn.wrong{border-color:var(--danger);background:rgba(255,71,87,0.1);color:var(--danger);}
    .category-badge{font-size:11px;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
    .progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:16px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.4s;}
    .timer-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:16px;overflow:hidden;}
    .timer-fill{height:100%;background:var(--primary);border-radius:3px;transition:width 0.1s linear;}
    @media(max-width:480px){.options{grid-template-columns:1fr;}.sentence-text{font-size:15px;}}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="navbar-brand"><div class="logo-icon">🎓</div><span class="logo-text">EduPlay</span></a>
  <ul class="navbar-nav"><li><a href="../games.html">🎮 Oyunlar</a></li></ul>
  <div class="navbar-actions"><a href="../profile.html" class="btn-avatar"><span data-user-avatar>🎓</span></a></div>
  <button class="mobile-menu-btn">☰</button>
</nav>
<div class="page-wrapper">
  <div class="game-container">
    <div id="startScreen" class="game-screen">
      <div class="big-emoji">📝</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:12px">Boşluk Doldur</h2>
      <p style="color:var(--text-muted);margin-bottom:28px">Cümledeki boşluğu doğru kelimeyle doldur! Tüm derslerden 25 soru.</p>
      <button class="btn btn-primary btn-lg" onclick="startGame()">📝 Başlat</button>
    </div>

    <div id="gameScreen" style="display:none">
      <div class="stat-row">
        <div class="stat"><div class="stat-val" id="scoreD">0</div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="qNumD">1/25</div><div class="stat-lbl">Soru</div></div>
        <div class="stat"><div class="stat-val" id="streakD">0🔥</div><div class="stat-lbl">Seri</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:4%"></div></div>
      <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
      <div class="category-badge" id="catBadge">KATEGORİ</div>
      <div class="sentence-card"><div class="sentence-text" id="sentenceEl"></div></div>
      <div class="options" id="opts"></div>
    </div>

    <div id="endScreen" class="game-screen" style="display:none">
      <div class="big-emoji" id="endEmoji">🏆</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:8px">Bitti!</h2>
      <p id="endMsg" style="color:var(--text-muted);margin-bottom:24px"></p>
      <div style="display:flex;gap:24px;justify-content:center;margin-bottom:32px">
        <div class="stat"><div class="stat-val" id="finalScore" style="font-size:36px"></div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="finalCorrect" style="font-size:36px;color:var(--success)"></div><div class="stat-lbl">Doğru</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="startGame()">🔄 Tekrar</button>
        <a href="../games.html" class="btn" style="background:rgba(255,255,255,0.04);border-color:var(--border)">← Oyunlar</a>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script>
const QUESTIONS=[
  // Matematik
  {cat:'Matematik',before:'Bir üçgenin iç açıları toplamı',blank:'180°',after:'dir.',opts:['90°','180°','270°','360°']},
  {cat:'Matematik',before:'π (pi) sayısı yaklaşık olarak',blank:'3,14',after:'dir.',opts:['2,71','3,14','3,41','1,41']},
  {cat:'Matematik',before:'Bir karenin 4 kenarı birbirine',blank:'eşit',after:'tir.',opts:['farklı','eşit','dik','paralel']},
  {cat:'Matematik',before:'2³ ifadesinin değeri',blank:'8',after:"'dir.",opts:['6','8','9','12']},
  {cat:'Matematik',before:'Bir tam sayının kendisiyle çarpımı',blank:'kare',after:'sayı verir.',opts:['çift','tek','kare','asal']},
  // Fen
  {cat:'Fen Bilimleri',before:'Bitkiler fotosentez yaparak',blank:'oksijen',after:'üretir.',opts:['karbondioksit','oksijen','azot','hidrojen']},
  {cat:'Fen Bilimleri',before:'Atomun merkezindeki bölgeye',blank:'çekirdek',after:'denir.',opts:['elektron','proton','çekirdek','nötron']},
  {cat:'Fen Bilimleri',before:'Işık hızı saniyede yaklaşık 300.000',blank:'km',after:"dir.",opts:['m','cm','mm','km']},
  {cat:'Fen Bilimleri',before:'Suyun kimyasal formülü',blank:'H₂O',after:"dur.",opts:['CO₂','H₂O','NaCl','O₂']},
  {cat:'Fen Bilimleri',before:'DNA\'nın tam açılımı Deoksiribonükleik',blank:'Asit',after:'tir.',opts:['Amino','Asit','Baz','Element']},
  // Tarih
  {cat:'Tarih',before:'Türkiye Cumhuriyeti',blank:'1923',after:"'te ilan edildi.",opts:['1919','1921','1923','1925']},
  {cat:'Tarih',before:'Osmanlı Devleti',blank:'1299',after:"'da kuruldu.",opts:['1299','1453','1071','1326']},
  {cat:'Tarih',before:'İstanbul',blank:'1453',after:"'te fethgedildi.",opts:['1453','1071','1299','1683']},
  {cat:'Tarih',before:'Atatürk',blank:'1881',after:"'de doğdu.",opts:['1872','1881','1890','1900']},
  {cat:'Tarih',before:'1. Dünya Savaşı',blank:'1914',after:"'te başladı.",opts:['1910','1912','1914','1918']},
  // Türkçe
  {cat:'Türkçe',before:'\"Koşmak\" fiilinde \"koş\" kökü bir',blank:'fiil',after:'köküdür.',opts:['isim','sıfat','fiil','zarf']},
  {cat:'Türkçe',before:'\"Güzellik\" kelimesinde \"-lik\" eki bir',blank:'yapım',after:'ekidir.',opts:['çekim','yapım','iyelik','hal']},
  {cat:'Türkçe',before:'Cümlede özneyi bulmak için',blank:'ne/kim',after:'sorusu sorulur.',opts:['ne/kim','nerede','nasıl','neden']},
  {cat:'Türkçe',before:'\"Kitap\" kelimesi çoğul yapılınca',blank:'kitaplar',after:'olur.',opts:['kitaplık','kitaplar','kitapçı','kitapçık']},
  {cat:'Türkçe',before:'Noktalama işaretlerinden biri olan \"!\" işaretine',blank:'ünlem',after:'işareti denir.',opts:['virgül','nokta','ünlem','soru']},
  // İngilizce
  {cat:'İngilizce',before:'"I ____ a student" cümlesinde doğru fiil',blank:'am',after:'dir.',opts:['is','are','am','be']},
  {cat:'İngilizce',before:'"Cat" kelimesinin Türkçesi',blank:'kedi',after:'dir.',opts:['köpek','kedi','kuş','balık']},
  {cat:'İngilizce',before:'"Monday" Türkçede',blank:'Pazartesi',after:'dir.',opts:['Pazar','Pazartesi','Salı','Çarşamba']},
  {cat:'İngilizce',before:'"Beautiful" kelimesinin Türkçesi',blank:'güzel',after:'dir.',opts:['çirkin','güzel','büyük','küçük']},
  // Coğrafya
  {cat:'Coğrafya',before:'Türkiye\'nin başkenti',blank:'Ankara',after:'dır.',opts:['İstanbul','İzmir','Ankara','Bursa']},
  {cat:'Coğrafya',before:'Dünyanın en büyük okyanusu',blank:'Pasifik',after:"'tir.",opts:['Atlantik','Hint','Pasifik','Arktik']},
  {cat:'Coğrafya',before:'Türkiye\'nin en büyük gölü',blank:'Van Gölü',after:"'dür.",opts:['Tuz Gölü','Van Gölü','Beyşehir','Eğirdir']},
];

let questions=[],current=0,score=0,correct=0,streak=0;
let timerInterval=null,timeLeft=0;

function shuffleArr(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  questions=shuffleArr(QUESTIONS).slice(0,25);
  current=0;score=0;correct=0;streak=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  loadQuestion();
}

function loadQuestion(){
  if(current>=questions.length){endGame();return;}
  clearInterval(timerInterval);
  const q=questions[current];
  document.getElementById('catBadge').textContent=q.cat.toUpperCase();
  document.getElementById('qNumD').textContent=`${current+1}/25`;
  document.getElementById('streakD').textContent=`${streak}🔥`;
  document.getElementById('progFill').style.width=`${(current/25)*100}%`;

  const sentEl=document.getElementById('sentenceEl');
  sentEl.innerHTML=`${q.before} <span class="blank" id="blankSpan">___</span> ${q.after}`;

  const opts=shuffleArr([...q.opts]);
  const optsEl=document.getElementById('opts');
  optsEl.innerHTML='';
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.textContent=opt;
    b.onclick=()=>selectAnswer(b,opt===q.blank,optsEl,q);
    optsEl.appendChild(b);
  });

  timeLeft=12;
  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    document.getElementById('timerFill').style.width=`${(timeLeft/12)*100}%`;
    if(timeLeft<=0){clearInterval(timerInterval);
      streak=0;
      Array.from(optsEl.children).forEach(b=>{b.disabled=true;if(b.textContent===q.blank)b.classList.add('correct');});
      document.getElementById('blankSpan').className='blank correct';
      document.getElementById('blankSpan').textContent=q.blank;
      current++;setTimeout(loadQuestion,1000);
    }
  },100);
}

function selectAnswer(btn,isCorrect,optsEl,q){
  clearInterval(timerInterval);
  Array.from(optsEl.children).forEach(b=>{b.disabled=true;if(b.textContent===q.blank)b.classList.add('correct');});
  if(!isCorrect)btn.classList.add('wrong');
  const blankEl=document.getElementById('blankSpan');
  blankEl.textContent=q.blank;
  blankEl.className='blank '+(isCorrect?'correct':'wrong');
  if(isCorrect){score+=80+streak*10;correct++;streak++;}else{streak=0;}
  document.getElementById('scoreD').textContent=score;
  current++;setTimeout(loadQuestion,900);
}

function endGame(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='block';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalCorrect').textContent=correct+'/25';
  const pct=correct/25;
  document.getElementById('endEmoji').textContent=pct>=0.8?'🏆':pct>=0.5?'⭐':'💪';
  document.getElementById('endMsg').textContent=pct>=0.8?'Mükemmel! Tüm boşlukları doldurdun!':pct>=0.5?'İyi! Biraz daha pratik yap.':'Dersleri tekrar et ve dene!';
  if(window.EduPlay) EduPlay.addXP(Math.floor(score/10));
}
</script>
</body>
</html>
