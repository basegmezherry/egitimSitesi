<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fen Eşleştirme — EduPlay</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <style>
    .game-container{max-width:640px;margin:0 auto;padding:24px;}
    .game-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;text-align:center;}
    .big-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:16px;}
    .stat{text-align:center;}
    .stat-val{font-size:22px;font-weight:700;color:var(--primary);font-family:var(--font-display);}
    .stat-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .round-title{font-size:14px;color:var(--primary);font-weight:700;margin-bottom:16px;background:rgba(0,245,212,0.06);border:1px solid rgba(0,245,212,0.15);border-radius:8px;padding:8px 16px;display:inline-block;}
    .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0;}
    .column-label{font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;text-align:left;}
    .match-items{display:flex;flex-direction:column;gap:8px;}
    .match-item{background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;transition:var(--transition);text-align:left;font-size:14px;color:var(--text);}
    .match-item:hover:not(.matched):not(.wrong-flash){border-color:rgba(0,245,212,0.3);background:rgba(0,245,212,0.04);}
    .match-item.selected{border-color:var(--primary);background:rgba(0,245,212,0.1);color:var(--primary);}
    .match-item.matched{border-color:var(--success);background:rgba(0,200,150,0.12);color:var(--success);cursor:default;}
    .match-item.wrong-flash{animation:wrongFlash 0.4s;}
    @keyframes wrongFlash{0%,100%{border-color:var(--border);}50%{border-color:var(--danger);background:rgba(255,71,87,0.15);}}
    .progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:16px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.4s;}
    .connection-line{font-size:20px;color:var(--primary);display:flex;align-items:center;justify-content:center;}
    @media(max-width:480px){.match-item{font-size:12px;padding:10px 12px;}}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="navbar-brand"><div class="logo-icon">🎓</div><span class="logo-text">EduPlay</span></a>
  <ul class="navbar-nav"><li><a href="../games.html">🎮 Oyunlar</a></li></ul>
  <div class="navbar-actions"><a href="../profile.html" class="btn-avatar"><span data-user-avatar>🎓</span></a></div>
  <button class="mobile-menu-btn">☰</button>
</nav>
<div class="page-wrapper">
  <div class="game-container">
    <div id="startScreen" class="game-screen">
      <div class="big-emoji">🔬</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:12px">Fen Eşleştirme</h2>
      <p style="color:var(--text-muted);margin-bottom:28px">Sol ve sağ kolonundaki kavramları doğru eşleştir! 8 tur, her tur 4 çift.</p>
      <button class="btn btn-primary btn-lg" onclick="startGame()">🔬 Başlat</button>
    </div>

    <div id="gameScreen" style="display:none">
      <div class="stat-row">
        <div class="stat"><div class="stat-val" id="scoreD">0</div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="qNumD">1/8</div><div class="stat-lbl">Tur</div></div>
        <div class="stat"><div class="stat-val" id="matchedD">0/4</div><div class="stat-lbl">Eşleşti</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:12.5%"></div></div>
      <div class="round-title" id="roundTitle">Konu</div>
      <div class="match-grid">
        <div>
          <div class="column-label">Kavram</div>
          <div class="match-items" id="leftCol"></div>
        </div>
        <div>
          <div class="column-label">Tanım / Eşi</div>
          <div class="match-items" id="rightCol"></div>
        </div>
      </div>
    </div>

    <div id="endScreen" class="game-screen" style="display:none">
      <div class="big-emoji" id="endEmoji">🏆</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:8px">Bitti!</h2>
      <p id="endMsg" style="color:var(--text-muted);margin-bottom:24px"></p>
      <div style="display:flex;gap:24px;justify-content:center;margin-bottom:32px">
        <div class="stat"><div class="stat-val" id="finalScore" style="font-size:36px"></div><div class="stat-lbl">Puan</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="startGame()">🔄 Tekrar</button>
        <a href="../games.html" class="btn" style="background:rgba(255,255,255,0.04);border-color:var(--border)">← Oyunlar</a>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script>
const ROUNDS=[
  {title:'⚛️ Element Sembolleri',pairs:[{left:'Oksijen',right:'O'},{left:'Hidrojen',right:'H'},{left:'Karbon',right:'C'},{left:'Azot',right:'N'}]},
  {title:'🧬 Hücre Organelleri',pairs:[{left:'Fotosentez yapar',right:'Kloroplast'},{left:'Enerji üretir',right:'Mitokondri'},{left:'Proteini yönetir',right:'Çekirdek'},{left:'Depo organeli',right:'Koful'}]},
  {title:'⚡ Elektrik Kavramları',pairs:[{left:'Akım birimi',right:'Amper'},{left:'Gerilim birimi',right:'Volt'},{left:'Direnç birimi',right:'Ohm'},{left:'Güç birimi',right:'Watt'}]},
  {title:'🌍 Güneş Sistemi',pairs:[{left:'En büyük gezegen',right:'Jüpiter'},{left:'En yakın gezegen',right:'Merkür'},{left:'Halkalı gezegen',right:'Satürn'},{left:'Kızıl gezegen',right:'Mars'}]},
  {title:'💧 Maddenin Halleri',pairs:[{left:'Buz → Su',right:'Erime'},{left:'Su → Buhar',right:'Buharlaşma'},{left:'Buhar → Su',right:'Yoğuşma'},{left:'Buz → Buhar',right:'Süblimleşme'}]},
  {title:'🦠 Canlılar Alemi',pairs:[{left:'Tek hücreli, çekirdeksiz',right:'Bakteri'},{left:'Çok hücreli, fotosentez',right:'Bitki'},{left:'Heterotraf, çok hücreli',right:'Hayvan'},{left:'Çürütücü, sporlı',right:'Mantar'}]},
  {title:'🔭 Kuvvetler',pairs:[{left:'Cismi yere çeken',right:'Yerçekimi'},{left:'Sürtünmeye karşı',right:'Sürtünme kuvveti'},{left:'Yüzeye dik, destek',right:'Normal kuvvet'},{left:'Mıknatısın etkisi',right:'Manyetik kuvvet'}]},
  {title:'🌡️ Isı ve Sıcaklık',pairs:[{left:'Isı birimi',right:'Joule'},{left:'Sıcaklık birimi',right:'Celsius (°C)'},{left:'Isıyı aktaran',right:'İletim'},{left:'Akışkanlarda ısı taşıma',right:'Taşınım'}]},
];

let rounds=[],current=0,score=0;
let selectedLeft=null,selectedRight=null,matched=0;

function shuffleArr(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  rounds=shuffleArr([...ROUNDS]).slice(0,8);
  current=0;score=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  loadRound();
}

function loadRound(){
  if(current>=rounds.length){endGame();return;}
  selectedLeft=null;selectedRight=null;matched=0;
  const r=rounds[current];
  document.getElementById('roundTitle').textContent=r.title;
  document.getElementById('qNumD').textContent=`${current+1}/8`;
  document.getElementById('matchedD').textContent=`0/4`;
  document.getElementById('progFill').style.width=`${(current/8)*100}%`;

  const lefts=shuffleArr(r.pairs.map(p=>p.left));
  const rights=shuffleArr(r.pairs.map(p=>p.right));

  renderColumn('leftCol',lefts,'left');
  renderColumn('rightCol',rights,'right');
}

function renderColumn(id,items,side){
  const col=document.getElementById(id);
  col.innerHTML='';
  items.forEach(item=>{
    const el=document.createElement('div');
    el.className='match-item';
    el.textContent=item;
    el.dataset.value=item;
    el.dataset.side=side;
    el.onclick=()=>selectItem(el);
    col.appendChild(el);
  });
}

function selectItem(el){
  if(el.classList.contains('matched'))return;
  const side=el.dataset.side;
  if(side==='left'){
    if(selectedLeft) selectedLeft.classList.remove('selected');
    selectedLeft=el;
    el.classList.add('selected');
  } else {
    if(selectedRight) selectedRight.classList.remove('selected');
    selectedRight=el;
    el.classList.add('selected');
  }
  if(selectedLeft&&selectedRight) checkMatch();
}

function checkMatch(){
  const r=rounds[current];
  const leftVal=selectedLeft.dataset.value;
  const rightVal=selectedRight.dataset.value;
  const pair=r.pairs.find(p=>p.left===leftVal&&p.right===rightVal);

  if(pair){
    selectedLeft.classList.remove('selected');
    selectedRight.classList.remove('selected');
    selectedLeft.classList.add('matched');
    selectedRight.classList.add('matched');
    score+=100;
    matched++;
    document.getElementById('scoreD').textContent=score;
    document.getElementById('matchedD').textContent=`${matched}/4`;
    if(matched>=4){current++;setTimeout(loadRound,600);}
  } else {
    selectedLeft.classList.remove('selected');
    selectedRight.classList.remove('selected');
    [selectedLeft,selectedRight].forEach(el=>{
      el.classList.add('wrong-flash');
      setTimeout(()=>el.classList.remove('wrong-flash'),400);
    });
    score=Math.max(0,score-20);
    document.getElementById('scoreD').textContent=score;
  }
  selectedLeft=null;selectedRight=null;
}

function endGame(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='block';
  document.getElementById('finalScore').textContent=score;
  const max=8*4*100;
  const pct=score/max;
  document.getElementById('endEmoji').textContent=pct>=0.8?'🏆':pct>=0.5?'⭐':'💪';
  document.getElementById('endMsg').textContent=pct>=0.8?'Fen kavramlarını çok iyi biliyorsun!':pct>=0.5?'İyi! Biraz daha çalış.':'Fen kavramlarını tekrar et!';
  if(window.EduPlay) EduPlay.addXP(Math.floor(score/10));
}
</script>
</body>
</html>
