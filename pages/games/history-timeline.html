<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Tarih Çizgisi — EduPlay</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <style>
    .game-container{max-width:600px;margin:0 auto;padding:24px;}
    .game-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;text-align:center;}
    .big-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:16px;}
    .stat{text-align:center;}
    .stat-val{font-size:22px;font-weight:700;color:var(--primary);font-family:var(--font-display);}
    .stat-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .instruction{font-size:13px;color:var(--text-muted);margin-bottom:16px;background:rgba(0,245,212,0.05);border:1px solid rgba(0,245,212,0.15);border-radius:8px;padding:10px 16px;}
    .events-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
    .event-item{background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:10px;padding:14px 18px;cursor:grab;transition:var(--transition);display:flex;align-items:center;gap:12px;text-align:left;user-select:none;}
    .event-item:active{cursor:grabbing;}
    .event-item.dragging{opacity:0.4;border-style:dashed;}
    .event-item.drag-over{border-color:var(--primary);background:rgba(0,245,212,0.08);}
    .event-item.correct{border-color:var(--success);background:rgba(0,200,150,0.1);}
    .event-item.wrong{border-color:var(--danger);background:rgba(255,71,87,0.08);}
    .drag-handle{font-size:18px;color:var(--text-muted);flex-shrink:0;}
    .event-text{flex:1;font-size:14px;color:var(--text);}
    .event-year{font-size:18px;font-weight:800;color:var(--primary);font-family:var(--font-display);flex-shrink:0;}
    .event-year.hidden{background:rgba(0,245,212,0.1);border-radius:6px;padding:2px 10px;color:transparent;border:1px solid rgba(0,245,212,0.2);}
    .btn-row{display:flex;gap:10px;justify-content:center;}
    .progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:20px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.4s;}
    .round-tag{font-size:12px;color:var(--text-muted);margin-bottom:12px;}
    @media(max-width:480px){.event-item{padding:12px;}.event-text{font-size:13px;}}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="navbar-brand"><div class="logo-icon">🎓</div><span class="logo-text">EduPlay</span></a>
  <ul class="navbar-nav"><li><a href="../games.html">🎮 Oyunlar</a></li></ul>
  <div class="navbar-actions"><a href="../profile.html" class="btn-avatar"><span data-user-avatar>🎓</span></a></div>
  <button class="mobile-menu-btn">☰</button>
</nav>
<div class="page-wrapper">
  <div class="game-container">
    <div id="startScreen" class="game-screen">
      <div class="big-emoji">📜</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:12px">Tarih Çizgisi</h2>
      <p style="color:var(--text-muted);margin-bottom:28px">Olayları doğru kronolojik sıraya diz! Sürükle ve bırak. 10 tur.</p>
      <button class="btn btn-primary btn-lg" onclick="startGame()">📜 Başlat</button>
    </div>

    <div id="gameScreen" style="display:none">
      <div class="stat-row">
        <div class="stat"><div class="stat-val" id="scoreD">0</div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="qNumD">1/10</div><div class="stat-lbl">Tur</div></div>
        <div class="stat"><div class="stat-val" id="correctD">0✓</div><div class="stat-lbl">Doğru</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:10%"></div></div>
      <div class="instruction">📅 Olayları en eskiden en yeniye sırala (yukarıdan aşağıya)</div>
      <div class="round-tag" id="roundTag">Tur 1/10</div>
      <div class="events-list" id="eventsList"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="checkOrder()">✅ Kontrol Et</button>
        <button class="btn" onclick="skipRound()" style="background:rgba(255,255,255,0.04);color:var(--text-muted)">⏭ Geç</button>
      </div>
    </div>

    <div id="endScreen" class="game-screen" style="display:none">
      <div class="big-emoji" id="endEmoji">🏆</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:8px">Bitti!</h2>
      <p id="endMsg" style="color:var(--text-muted);margin-bottom:24px"></p>
      <div style="display:flex;gap:24px;justify-content:center;margin-bottom:32px">
        <div class="stat"><div class="stat-val" id="finalScore" style="font-size:36px"></div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="finalCorrect" style="font-size:36px;color:var(--success)"></div><div class="stat-lbl">Doğru Tur</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="startGame()">🔄 Tekrar</button>
        <a href="../games.html" class="btn" style="background:rgba(255,255,255,0.04);border-color:var(--border)">← Oyunlar</a>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script>
const ROUNDS=[
  [{year:1071,text:'Malazgirt Savaşı — Türklerin Anadolu\'ya girişi'},{year:1299,text:'Osmanlı Devleti\'nin kuruluşu'},{year:1453,text:'İstanbul\'un Fethi'},{year:1683,text:'Viyana Kuşatması'}],
  [{year:1789,text:'Fransız Devrimi'},{year:1815,text:'Napolyon\'un Waterloo\'da yenilgisi'},{year:1871,text:'Alman İmparatorluğu\'nun kuruluşu'},{year:1914,text:'1. Dünya Savaşı\'nın başlangıcı'}],
  [{year:1919,text:'Kurtuluş Savaşı\'nın başlangıcı'},{year:1922,text:'Saltanatın kaldırılması'},{year:1923,text:'Türkiye Cumhuriyeti\'nin ilanı'},{year:1924,text:'Hilafetin kaldırılması'}],
  [{year:1923,text:'Cumhuriyet\'in ilanı'},{year:1928,text:'Yeni Türk alfabesinin kabulü'},{year:1934,text:'Soyadı Kanunu'},{year:1938,text:'Atatürk\'ün vefatı'}],
  [{year:1939,text:'2. Dünya Savaşı\'nın başlangıcı'},{year:1945,text:'Savaşın sona ermesi'},{year:1950,text:'Kore Savaşı'},{year:1969,text:'Ay\'a ilk insan adımı'}],
  [{year:1071,text:'Malazgirt Savaşı'},{year:1176,text:'Miryokefalon Savaşı'},{year:1243,text:'Kösedağ Savaşı — Moğol galibiyeti'},{year:1326,text:'Bursa\'nın fethi'}],
  [{year:1402,text:'Ankara Savaşı — Timur galibiyeti'},{year:1453,text:'İstanbul\'un Fethi'},{year:1517,text:'Mısır\'ın fethi'},{year:1529,text:'Viyana Kuşatması (1. kez)'}],
  [{year:1856,text:'Islahat Fermanı'},{year:1876,text:'1. Meşrutiyet'},{year:1908,text:'2. Meşrutiyet'},{year:1919,text:'Samsun\'a çıkış'}],
  [{year:1215,text:'Magna Carta imzalandı'},{year:1492,text:'Amerika\'nın keşfi'},{year:1543,text:'Kopernik\'in güneş sistemi teorisi'},{year:1687,text:'Newton\'un yer çekimi yasası'}],
  [{year:1881,text:'Atatürk\'ün doğumu'},{year:1905,text:'Harp Okulu\'ndan mezuniyet'},{year:1915,text:'Çanakkale Savaşları'},{year:1919,text:'Samsun\'a çıkış — Kurtuluş Savaşı'}],
];

let rounds=[],current=0,score=0,correct=0;
let dragSrcEl=null;

function shuffleArr(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  rounds=shuffleArr([...ROUNDS]).slice(0,10);
  current=0;score=0;correct=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  loadRound();
}

function loadRound(){
  if(current>=rounds.length){endGame();return;}
  const events=shuffleArr([...rounds[current]]);
  document.getElementById('qNumD').textContent=`${current+1}/10`;
  document.getElementById('correctD').textContent=`${correct}✓`;
  document.getElementById('progFill').style.width=`${(current/10)*100}%`;
  document.getElementById('roundTag').textContent=`Tur ${current+1}/10`;

  const list=document.getElementById('eventsList');
  list.innerHTML='';
  events.forEach((ev,i)=>{
    const item=document.createElement('div');
    item.className='event-item';
    item.draggable=true;
    item.dataset.year=ev.year;
    item.innerHTML=`<span class="drag-handle">⠿</span><span class="event-text">${ev.text}</span><span class="event-year hidden">${ev.year}</span>`;
    item.addEventListener('dragstart',onDragStart);
    item.addEventListener('dragover',onDragOver);
    item.addEventListener('drop',onDrop);
    item.addEventListener('dragend',onDragEnd);
    list.appendChild(item);
  });
}

function onDragStart(e){dragSrcEl=this;this.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function onDragOver(e){e.preventDefault();this.classList.add('drag-over');return false;}
function onDrop(e){
  e.stopPropagation();
  if(dragSrcEl!==this){
    const list=document.getElementById('eventsList');
    const items=[...list.children];
    const srcIdx=items.indexOf(dragSrcEl);
    const dstIdx=items.indexOf(this);
    if(srcIdx<dstIdx) list.insertBefore(dragSrcEl,this.nextSibling);
    else list.insertBefore(dragSrcEl,this);
  }
  return false;
}
function onDragEnd(){
  document.querySelectorAll('.event-item').forEach(el=>{el.classList.remove('dragging','drag-over');});
  dragSrcEl=null;
}

function checkOrder(){
  const items=[...document.getElementById('eventsList').children];
  const userOrder=items.map(el=>parseInt(el.dataset.year));
  const correct_order=[...userOrder].sort((a,b)=>a-b);
  const isCorrect=userOrder.every((y,i)=>y===correct_order[i]);

  items.forEach((item,i)=>{
    item.classList.add(userOrder[i]===correct_order[i]?'correct':'wrong');
    item.querySelector('.event-year').classList.remove('hidden');
  });

  if(isCorrect){score+=200;correct++;}
  document.getElementById('scoreD').textContent=score;
  document.getElementById('correctD').textContent=`${correct}✓`;
  current++;
  setTimeout(loadRound,1200);
}

function skipRound(){current++;loadRound();}

function endGame(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='block';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalCorrect').textContent=correct+'/10';
  const pct=correct/10;
  document.getElementById('endEmoji').textContent=pct>=0.8?'🏆':pct>=0.5?'⭐':'💪';
  document.getElementById('endMsg').textContent=pct>=0.8?'Tarihi çok iyi biliyorsun!':pct>=0.5?'İyi! Tarihi biraz daha çalış.':'Tarih olaylarını kronolojik sıraya çalış!';
  if(window.EduPlay) EduPlay.addXP(Math.floor(score/10));
}
</script>
</body>
</html>
