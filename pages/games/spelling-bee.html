<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Yazım Ustası — EduPlay</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <style>
    .game-container{max-width:600px;margin:0 auto;padding:24px;}
    .game-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px;text-align:center;}
    .big-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:16px;font-family:var(--font-display);}
    .stat{text-align:center;}
    .stat-val{font-size:22px;font-weight:700;color:var(--primary);}
    .stat-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .clue-box{background:rgba(0,245,212,0.05);border:1px solid rgba(0,245,212,0.15);border-radius:var(--radius-sm);padding:20px;margin:20px 0;}
    .clue-text{font-size:16px;color:var(--text);margin-bottom:8px;}
    .clue-hint{font-size:13px;color:var(--text-muted);}
    .first-letters{font-size:14px;color:var(--primary);font-weight:700;letter-spacing:3px;margin:8px 0;}
    .answer-input{width:100%;background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:10px;padding:16px 20px;font-size:22px;font-weight:700;color:var(--text);font-family:var(--font-display);text-align:center;letter-spacing:4px;outline:none;transition:var(--transition);margin-bottom:16px;}
    .answer-input:focus{border-color:var(--primary);}
    .answer-input.correct{border-color:var(--success);background:rgba(0,200,150,0.1);color:var(--success);}
    .answer-input.wrong{border-color:var(--danger);background:rgba(255,71,87,0.08);color:var(--danger);}
    .btn-row{display:flex;gap:10px;justify-content:center;}
    .progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:20px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.4s;}
    .letter-count{font-size:12px;color:var(--text-muted);margin-bottom:8px;}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="navbar-brand"><div class="logo-icon">🎓</div><span class="logo-text">EduPlay</span></a>
  <ul class="navbar-nav"><li><a href="../games.html">🎮 Oyunlar</a></li></ul>
  <div class="navbar-actions"><a href="../profile.html" class="btn-avatar"><span data-user-avatar>🎓</span></a></div>
  <button class="mobile-menu-btn">☰</button>
</nav>
<div class="page-wrapper">
  <div class="game-container">
    <div id="startScreen" class="game-screen">
      <div class="big-emoji">✍️</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:12px">Yazım Ustası</h2>
      <p style="color:var(--text-muted);margin-bottom:28px">Tanımı oku, doğru yazımla kelimeyi yaz! Türkçe yazım kurallarını öğren.</p>
      <button class="btn btn-primary btn-lg" onclick="startGame()">✍️ Başlat</button>
    </div>

    <div id="gameScreen" style="display:none">
      <div class="stat-row">
        <div class="stat"><div class="stat-val" id="scoreD">0</div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="qNumD">1/20</div><div class="stat-lbl">Kelime</div></div>
        <div class="stat"><div class="stat-val" id="streakD">0🔥</div><div class="stat-lbl">Seri</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:5%"></div></div>
      <div class="clue-box">
        <div class="clue-text" id="clueText">Tanım yükleniyor...</div>
        <div class="first-letters" id="firstLetters"></div>
        <div class="letter-count" id="letterCount"></div>
      </div>
      <input class="answer-input" id="answerInput" type="text" placeholder="Kelimeyi yaz..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="handleKey(event)"/>
      <div class="btn-row">
        <button class="btn" onclick="showHint()" style="background:rgba(255,209,0,0.08);border-color:var(--warning);color:var(--warning)">💡 İpucu</button>
        <button class="btn btn-primary" onclick="checkAnswer()">✅ Kontrol</button>
        <button class="btn" onclick="skipWord()" style="background:rgba(255,255,255,0.04);color:var(--text-muted)">⏭ Geç</button>
      </div>
    </div>

    <div id="endScreen" class="game-screen" style="display:none">
      <div class="big-emoji" id="endEmoji">🏆</div>
      <h2 style="font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:8px">Bitti!</h2>
      <p id="endMsg" style="color:var(--text-muted);margin-bottom:24px"></p>
      <div style="display:flex;gap:24px;justify-content:center;margin-bottom:32px">
        <div class="stat"><div class="stat-val" id="finalScore" style="font-size:36px"></div><div class="stat-lbl">Puan</div></div>
        <div class="stat"><div class="stat-val" id="finalCorrect" style="font-size:36px;color:var(--success)"></div><div class="stat-lbl">Doğru</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="startGame()">🔄 Tekrar</button>
        <a href="../games.html" class="btn" style="background:rgba(255,255,255,0.04);border-color:var(--border)">← Oyunlar</a>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script>
const WORDS=[
  {word:'kalp',definition:'Kanı vücuda pompalayan kas organ',hint:'k___'},
  {word:'beyin',definition:'Düşünen ve sinir sistemini yöneten organ',hint:'b____'},
  {word:'oksijen',definition:'Solunumda kullanılan gaz elementi',hint:'o______'},
  {word:'hücre',definition:'Canlıların en küçük yapı birimi',hint:'h____'},
  {word:'evrim',definition:'Canlıların zaman içinde değişim süreci',hint:'e____'},
  {word:'enerji',definition:'İş yapabilme kapasitesi',hint:'e_____'},
  {word:'sürtünme',definition:'İki yüzey arasındaki hareket direnci',hint:'s_______'},
  {word:'mıknatıs',definition:'Demir çeken doğal veya yapay malzeme',hint:'m_______'},
  {word:'fotosentez',definition:'Bitkilerin güneş ışığından besin üretmesi',hint:'f_________'},
  {word:'klorofil',definition:'Bitkilere yeşil renk veren madde',hint:'k_______'},
  {word:'kütle',definition:'Bir cismin içindeki madde miktarı',hint:'k____'},
  {word:'hacim',definition:'Bir cismin kapladığı yer miktarı',hint:'h____'},
  {word:'erozyon',definition:'Toprağın su ve rüzgarla taşınması',hint:'e______'},
  {word:'deprem',definition:'Yer kabuğundaki sarsıntı',hint:'d_____'},
  {word:'tsunami',definition:'Denizaltı depreminin oluşturduğu büyük dalga',hint:'t______'},
  {word:'cumhuriyet',definition:'Türkiye\'nin yönetim biçimi, 1923\'te ilan edildi',hint:'c_________'},
  {word:'anayasa',definition:'Devletin temel kanunlar belgesi',hint:'a______'},
  {word:'meclis',definition:'Yasaları çıkaran ulusal kurul',hint:'m_____'},
  {word:'demokrasi',definition:'Halkın yönetim biçimi',hint:'d________'},
  {word:'bağımsızlık',definition:'Özgür ve egemen olma durumu',hint:'b__________'},
];

let questions=[],current=0,score=0,correct=0,streak=0,hintUsed=false;

function shuffleArr(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  questions=shuffleArr(WORDS).slice(0,20);
  current=0;score=0;correct=0;streak=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  loadWord();
}

function loadWord(){
  if(current>=questions.length){endGame();return;}
  hintUsed=false;
  const q=questions[current];
  const inp=document.getElementById('answerInput');
  inp.value='';
  inp.className='answer-input';
  inp.disabled=false;
  inp.focus();
  document.getElementById('clueText').textContent=q.definition;
  document.getElementById('firstLetters').textContent=q.word[0].toUpperCase()+'...';
  document.getElementById('letterCount').textContent=`${q.word.length} harf`;
  document.getElementById('qNumD').textContent=`${current+1}/20`;
  document.getElementById('streakD').textContent=`${streak}🔥`;
  document.getElementById('progFill').style.width=`${(current/20)*100}%`;
}

function showHint(){
  hintUsed=true;
  document.getElementById('firstLetters').textContent=questions[current].hint.toUpperCase();
}

function handleKey(e){if(e.key==='Enter')checkAnswer();}

function checkAnswer(){
  const q=questions[current];
  const inp=document.getElementById('answerInput');
  const userAns=inp.value.trim().toLowerCase().replace(/\s+/g,'');
  const isCorrect=userAns===q.word.toLowerCase();
  inp.disabled=true;
  inp.className='answer-input '+(isCorrect?'correct':'wrong');
  if(!isCorrect) inp.value=q.word.toUpperCase();
  if(isCorrect){const pts=hintUsed?60:100;score+=pts+streak*10;correct++;streak++;}
  else{streak=0;}
  document.getElementById('scoreD').textContent=score;
  current++;
  setTimeout(loadWord,900);
}

function skipWord(){streak=0;current++;loadWord();}

function endGame(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='block';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalCorrect').textContent=correct+'/20';
  const pct=correct/20;
  document.getElementById('endEmoji').textContent=pct>=0.8?'🏆':pct>=0.5?'⭐':'💪';
  document.getElementById('endMsg').textContent=pct>=0.8?'Harika yazım! Kelime ustasısın!':pct>=0.5?'İyi! Biraz daha pratik yap.':'Kelime bilgini geliştirmeye devam et!';
  if(window.EduPlay) EduPlay.addXP(Math.floor(score/10));
}
</script>
</body>
</html>
